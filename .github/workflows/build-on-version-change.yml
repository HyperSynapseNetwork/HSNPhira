name: Build on Version Change

on:
  push:
    branches:
      - frontend-remake
    paths:
      - 'package.json'
      - 'public/config/version.json'
      - '.github/workflows/build-on-version-change.yml'
  pull_request:
    branches:
      - frontend-remake
    paths:
      - 'package.json'
      - 'public/config/version.json'
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      id: setup-node
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'pnpm'
        check-latest: true

    - name: Verify Node.js installation
      shell: bash
      run: |
        echo "Checking Node.js installation..."
        node --version
        npm --version
        echo "Node.js installation verified."
    
    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Check if version actually changed
      id: check-version
      shell: bash
      run: |
        # 检查触发事件类型
        echo "Event name: $GITHUB_EVENT_NAME"
        
        # 如果是手动触发，总是构建
        if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
          echo "Manual trigger detected. Will proceed with build."
          echo "should_build=true" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        # 获取当前版本信息
        CURRENT_PACKAGE_VERSION=$(jq -r .version package.json)
        CURRENT_POLICY_VERSION=$(jq -r .policyVersion public/config/version.json)
        CURRENT_APP_VERSION=$(jq -r .appVersion public/config/version.json)
        
        # 获取上一个提交的版本信息（如果存在）
        if git log -n 1 --oneline > /dev/null 2>&1; then
          PREV_PACKAGE_VERSION=$(git show HEAD~1:package.json 2>/dev/null | jq -r .version 2>/dev/null || echo "none")
          PREV_POLICY_VERSION=$(git show HEAD~1:public/config/version.json 2>/dev/null | jq -r .policyVersion 2>/dev/null || echo "none")
          PREV_APP_VERSION=$(git show HEAD~1:public/config/version.json 2>/dev/null | jq -r .appVersion 2>/dev/null || echo "none")
        else
          PREV_PACKAGE_VERSION="none"
          PREV_POLICY_VERSION="none"
          PREV_APP_VERSION="none"
        fi
        
        echo "Previous versions:"
        echo "  Package: $PREV_PACKAGE_VERSION"
        echo "  Policy: $PREV_POLICY_VERSION"
        echo "  App: $PREV_APP_VERSION"
        
        echo "Current versions:"
        echo "  Package: $CURRENT_PACKAGE_VERSION"
        echo "  Policy: $CURRENT_POLICY_VERSION"
        echo "  App: $CURRENT_APP_VERSION"
        
        # 检查是否有版本变化
        VERSION_CHANGED=false
        if [[ "$CURRENT_PACKAGE_VERSION" != "$PREV_PACKAGE_VERSION" ]]; then
          echo "Package version changed from $PREV_PACKAGE_VERSION to $CURRENT_PACKAGE_VERSION"
          VERSION_CHANGED=true
        fi
        
        if [[ "$CURRENT_POLICY_VERSION" != "$PREV_POLICY_VERSION" ]]; then
          echo "Policy version changed from $PREV_POLICY_VERSION to $CURRENT_POLICY_VERSION"
          VERSION_CHANGED=true
        fi
        
        if [[ "$CURRENT_APP_VERSION" != "$PREV_APP_VERSION" ]]; then
          echo "App version changed from $PREV_APP_VERSION to $CURRENT_APP_VERSION"
          VERSION_CHANGED=true
        fi
        
        if [[ "$VERSION_CHANGED" == "true" ]]; then
          echo "Version change detected, will proceed with build."
          echo "should_build=true" >> $GITHUB_OUTPUT
        else
          echo "No version change detected. Skipping build."
          echo "should_build=false" >> $GITHUB_OUTPUT
        fi

    - name: Build SPA
      if: steps.check-version.outputs.should_build == 'true'
      run: |
        # 构建SPA版本
        echo "Building SPA version..."
        pnpm run build
        
        # 将SPA构建产物移动到spa-dist目录
        mv dist spa-dist
        echo "SPA build completed. Output directory: spa-dist/"

    - name: Build SSG
      if: steps.check-version.outputs.should_build == 'true'
      run: |
        # 构建SSG版本
        echo "Building SSG version..."
        pnpm run build:ssg
        
        # 将SSG构建产物移动到ssg-dist目录
        mv dist ssg-dist
        echo "SSG build completed. Output directory: ssg-dist/"

    - name: Upload SPA artifacts
      if: steps.check-version.outputs.should_build == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: spa-dist
        path: spa-dist/
        retention-days: 7

    - name: Upload SSG artifacts
      if: steps.check-version.outputs.should_build == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ssg-dist
        path: ssg-dist/
        retention-days: 7

    - name: Skip build notification
      if: steps.check-version.outputs.should_build == 'false'
      run: |
        echo "No version change detected. Skipping build."
        echo "This workflow was triggered by changes to workflow files or manual trigger, but no version changes were found."