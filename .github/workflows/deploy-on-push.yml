name: "Deploy on Push"

on:
  push:
    branches:
      - frontend-remake
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'
          check-latest: true

      # - name: Setup Java for TWA
      #   uses: actions/setup-java@v3
      #   with:
      #     distribution: 'temurin'
      #     java-version: '17'

      # - name: Install bubblewrap CLI
      #   run: npm install -g @bubblewrap/cli

      - name: Setup Rust for HSNPM
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu

      - name: Verify installation
        run: |
          node --version
          npm --version
          pnpm --version
          java --version
          bubblewrap --version || echo "bubblewrap 未安装"

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure WebPush VAPID keys
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: |
          echo "🔑 配置 WebPush VAPID 密钥..."
          echo "使用 GitHub Secrets 中的 VAPID 密钥（如果已配置）"
          chmod +x ./scripts/setup-webpush.sh
          ./scripts/setup-webpush.sh
          echo "✅ WebPush 配置完成"

      - name: Build SSG version with SEO files
        run: pnpm run build:ssg

      - name: Build HSNPM notification service
        run: |
          echo "🔨 构建 HSNPM 通知服务..."
          cd HSNPM
          cargo build --release
          echo "✅ HSNPM 构建完成"
          ls -la target/release/

      - name: Verify build output
        run: |
          echo "构建输出目录内容:"
          ls -la dist/
          echo ""
          echo "检查SEO文件:"
          [ -f dist/sitemap.xml ] && echo "✅ sitemap.xml 存在" || echo "❌ sitemap.xml 不存在"
          [ -f dist/robots.txt ] && echo "✅ robots.txt 存在" || echo "❌ robots.txt 不存在"

