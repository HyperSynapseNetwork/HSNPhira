<!DOCTYPE html>
<html lang="zh">
<head>
  <!-- 加载动画样式 -->
  <style>
    #page-loader {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.95);
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s;
      opacity: 1;
      pointer-events: auto;
    }
    #page-loader.hide {
      opacity: 0;
      pointer-events: none;
    }
    .load_11 {
      width: 50px;
      height: 40px;
      display: inline-block;
      text-align: center;
      font-size: 10px;
    }
    .load_11 > div {
      background-color: #61E8EA;
      height: 100%;
      width: 6px;
      display: inline-block;
      -webkit-animation: sk-stretchdelay 1.2s infinite ease-in-out;
      animation: sk-stretchdelay 1.2s infinite ease-in-out;
    }
    .load_11 .rect2 { -webkit-animation-delay: -1.1s; animation-delay: -1.1s; }
    .load_11 .rect3 { -webkit-animation-delay: -1.0s; animation-delay: -1.0s; }
    .load_11 .rect4 { -webkit-animation-delay: -0.9s; animation-delay: -0.9s; }
    .load_11 .rect5 { -webkit-animation-delay: -0.8s; animation-delay: -0.8s; }
    @-webkit-keyframes sk-stretchdelay { 0%, 40%, 100% { -webkit-transform: scaleY(0.4) } 20% { -webkit-transform: scaleY(1.0) } }
    @keyframes sk-stretchdelay { 0%, 40%, 100% { transform: scaleY(0.4); -webkit-transform: scaleY(0.4); } 20% { transform: scaleY(1.0); -webkit-transform: scaleY(1.0); } }
    /* 统一文字颜色 */
    body, th, td, .form-label, .section-title, .admin-title, .user-count, .info-title, .info-value, .modal-title, .batch-label, .btn, .btn-outline, .action-btn, .badge, .dropdown-content a, .dropdown-content span {
      color: #61E8EA !important;
    }
    /* 文字悬停效果（去下划线，发光晕） */
    th:hover, td:hover, .form-label:hover, .section-title:hover, .admin-title:hover, .user-count:hover, .info-title:hover, .info-value:hover, .modal-title:hover, .batch-label:hover, .btn:hover, .btn-outline:hover, .action-btn:hover, .badge:hover, .dropdown-content a:hover, .dropdown-content span:hover {
      color: #61E8EA !important;
      text-shadow: 0 0 8px #61E8EA88, 0 0 2px #61E8EA;
      cursor: pointer;
      transition: color 0.2s, text-shadow 0.2s;
      text-decoration: none;
    }
    /* 卡片悬停效果 */
    .admin-container:hover, .modal-content:hover, .info-card:hover {
      background: rgba(255,255,255,0.12);
      box-shadow: 0 8px 32px rgba(97,232,234,0.25), 0 2px 8px rgba(0,0,0,0.18);
      border: 1.5px solid #61E8EA;
      transform: scale(1.03);
      transition: all 0.25s cubic-bezier(.4,2,.3,1);
      z-index: 2;
    }
  </style>
  <meta charset="UTF-8" />
  <meta name="description" content="HyperSynapse Network 管理员控制台" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>管理员控制台 - HyperSynapse Phira</title>
  <!-- 复用account.html的样式 -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #000;
      color: #eee;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }
    .parallax-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), 
                        url('https://webstatic.cn-nb1.rains3.com/5712%C3%973360.jpeg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }
    header {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 1.5rem;
      backdrop-filter: blur(12px);
      background: rgba(0, 0, 0, 0.4);
      z-index: 1000;
      box-sizing: border-box;
    }
    .logo-nav-container {
      display: flex;
      align-items: center;
      flex: 1;
    }
    #logo-img {
      height: 32px;
      margin-right: 1.2rem;
    }
    .nav-links {
      display: flex;
    }
    .nav-links a {
      color: #eee;
      margin-right: 1.2rem;
      text-decoration: none;
      transition: 0.3s;
      font-size: 0.95rem;
    }
    .nav-links a:hover {
      color: #fff;
      text-shadow: 0 0 4px #fff;
    }
    .user-section {
      display: flex;
      justify-content: flex-end;
      flex: 1;
    }
    .glass-button {
      display: flex;
      align-items: center;
      padding: 0.4rem 1rem;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 100px;
    }
    .glass-button:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(1.05);
    }
    .login-btn {
      color: #eee;
      text-decoration: none;
      font-size: 0.95rem;
      white-space: nowrap;
      width: 100%;
      text-align: center;
    }
    .user-info {
      display: flex;
      align-items: center;
      position: relative;
      cursor: pointer;
      width: 100%;
    }
    .username {
      margin-right: 0.8rem;
      font-size: 0.95rem;
      color: #eee;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .user-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .dropdown-content {
      position: absolute;
      top: 100%;
      right: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 8px;
      padding: 0.8rem;
      min-width: 160px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      z-index: 1001;
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px);
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .dropdown-content.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .dropdown-content span {
      display: block;
      padding: 0.3rem 0.5rem;
      font-weight: bold;
      color: #61E8EA;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 0.5rem;
    }
    .dropdown-content a {
      display: block;
      padding: 0.5rem;
      color: #eee;
      text-decoration: none;
      border-radius: 4px;
      transition: all 0.3s ease;
    }
    .dropdown-content a:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }
    main {
      position: relative;
      z-index: 2;
      padding-top: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-bottom: 50px;
    }
    
    /* 新增3D卡片效果 */
    .account-container {
      transform-style: preserve-3d;
      transform: translateZ(20px);
      transition: transform 0.3s ease;
      animation: gentleSway 8s infinite ease-in-out;
      width: 95%;
      max-width: 800px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin: 1rem;
    }

    @keyframes gentleSway {
      0%, 100% { transform: translateZ(20px) rotateX(0.5deg) rotateY(0.5deg); }
      25% { transform: translateZ(20px) rotateX(-0.5deg) rotateY(-1deg); }
      50% { transform: translateZ(20px) rotateX(0.5deg) rotateY(1deg); }
      75% { transform: translateZ(20px) rotateX(-0.5deg) rotateY(0.5deg); }
    }

    .account-container.tilting {
      animation: none;
      transition: transform 0.1s linear;
    }
    
    .account-header {
      display: flex;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .account-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin-right: 1.5rem;
      background: rgba(0, 0, 0, 0.3);
    }
    .account-info {
      flex: 1;
    }
    .account-name {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      color: #fff;
    }
    .account-subtitle {
      color: #aaa;
      margin-bottom: 0.3rem;
      font-size: 1rem;
    }
    .account-stats {
      display: flex;
      margin-top: 1rem;
      gap: 1.5rem;
    }
    .stat-item {
      text-align: center;
    }
    .stat-value {
      font-size: 1.5rem;
      color: #61E8EA;
      font-weight: bold;
    }
    .stat-label {
      font-size: 0.9rem;
      color: #aaa;
    }
    .form-section {
      margin-bottom: 2rem;
    }
    .section-title {
      font-size: 1.3rem;
      margin-bottom: 1.2rem;
      color: #61E8EA;
      position: relative;
      padding-left: 1rem;
    }
    .section-title::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 70%;
      width: 4px;
      background: #61E8EA;
      border-radius: 4px;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      color: #ddd;
    }
    .form-input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }
    .form-input:focus {
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }
    .form-row {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .form-col {
      flex: 1;
    }
    .badge {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      font-size: 0.85rem;
      margin-right: 0.5rem;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .badge-admin {
      background: rgba(255, 153, 0, 0.2);
      color: #ff9900;
    }
    .badge-dev {
      background: rgba(0, 204, 255, 0.2);
      color: #00ccff;
    }
    .btn {
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      color: white;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #ddd;
    }
    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    .btn-container {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-top: 1rem;
    }
    .info-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 1.2rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(6px);
    }
    .info-title {
      color: #aaa;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }
    .info-value {
      font-size: 1.1rem;
      color: #fff;
      word-break: break-all;
    }
    .status-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 0.5rem;
    }
    .status-active {
      background: #0f0;
      box-shadow: 0 0 8px #0f0;
    }
    .status-inactive {
      background: #f33;
    }
    .message {
      padding: 0.8rem;
      border-radius: 8px;
      margin: 1rem 0;
      text-align: center;
      display: none;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .message-success {
      background: rgba(0, 200, 0, 0.2);
      color: #0f0;
    }
    .message-error {
      background: rgba(200, 0, 0, 0.2);
      color: #f33;
    }
    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-top: 1rem;
    }
    @media (max-width: 768px) {
      header {
        padding: 0.5rem 1rem;
        flex-wrap: wrap;
      }
      .logo-nav-container {
        flex: 0 0 100%;
        margin-bottom: 0.5rem;
      }
      .user-section {
        flex: 0 0 100%;
        justify-content: flex-end;
      }
      .nav-links a {
        margin-right: 1rem;
      }
      .username {
        max-width: 80px;
      }
      .account-header {
        flex-direction: column;
        text-align: center;
      }
      .account-avatar {
        margin-right: 0;
        margin-bottom: 1rem;
      }
      .form-row {
        flex-direction: column;
        gap: 1rem;
      }
      .account-stats {
        justify-content: center;
      }
    }
    /* 添加管理员页面特有样式 */
    .admin-container {
      transform-style: preserve-3d;
      transform: translateZ(20px);
      transition: transform 0.3s ease;
      animation: gentleSway 8s infinite ease-in-out;
      width: 95%;
      max-width: 1200px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin: 1rem;
    }
    
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .admin-title {
      font-size: 2rem;
      color: #61E8EA;
    }
    
    .user-count {
      background: rgba(255, 215, 0, 0.2);
      color: #61E8EA;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      font-weight: bold;
    }
    
    .filters {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    
    .filter-input {
      flex: 1;
      min-width: 250px;
      padding: 0.8rem 1rem;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      outline: none;
    }
    
    .filter-input:focus {
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }
    
    .users-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 2rem;
    }
    
    .users-table th {
      text-align: left;
      padding: 1rem;
      background: rgba(255, 215, 0, 0.1);
      color: #61E8EA;
      font-weight: 500;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .users-table td {
      padding: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .user-row:hover {
      background: rgba(255, 255, 255, 0.03);
    }
    
    .user-avatar-small {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .user-select {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }
    
    .badge {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      font-size: 0.85rem;
      margin-right: 0.5rem;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .badge-admin {
      background: rgba(255, 153, 0, 0.2);
      color: #ff9900;
    }
    
    .badge-dev {
      background: rgba(0, 204, 255, 0.2);
      color: #00ccff;
    }
    
    .actions-cell {
      display: flex;
      gap: 0.5rem;
    }
    
    .action-btn {
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .action-btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    
    .btn-edit {
      background: rgba(0, 150, 255, 0.2);
      color: #0096ff;
    }
    
    .batch-actions {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    
    .batch-form {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }
    
    .batch-label {
      color: #ddd;
      font-size: 0.9rem;
    }
    
    .batch-select {
      padding: 0.6rem 1rem;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      min-width: 150px;
    }
    
    .message {
      padding: 0.8rem;
      border-radius: 8px;
      margin: 1rem 0;
      text-align: center;
      display: none;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .message-success {
      background: rgba(0, 200, 0, 0.2);
      color: #0f0;
    }
    
    .message-error {
      background: rgba(200, 0, 0, 0.2);
      color: #f33;
    }
    
    /* 模态框样式 */
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      z-index: 9999;
      display: none;
    }
    
    .modal-content {
      background: rgba(30, 30, 40, 0.9);
      padding: 2rem;
      border-radius: 16px;
      color: #fff;
      backdrop-filter: blur(20px);
      max-width: 500px;
      width: 90%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    
    .modal-title {
      font-size: 1.5rem;
      color: #61E8EA;
      margin: 0;
    }
    
    .close-modal {
      background: none;
      border: none;
      color: #aaa;
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.3s;
    }
    
    .close-modal:hover {
      color: #fff;
    }
    
    .modal-body {
      margin-bottom: 1.5rem;
    }
    
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
    }
    
    .password-display {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.8rem;
      border-radius: 8px;
      font-family: monospace;
      word-break: break-all;
      margin: 0.5rem 0;
    }
    
    .reveal-btn {
      background: rgba(255, 215, 0, 0.2);
      color: #61E8EA;
      border: none;
      padding: 0.3rem 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <!-- 页面加载动画 -->
  <div id="page-loader">
    <div class="load_11">
      <div class="rect1"></div>
      <div class="rect2"></div>
      <div class="rect3"></div>
      <div class="rect4"></div>
      <div class="rect5"></div>
    </div>
  </div>
  <div class="parallax-bg"></div>
  <header>
    <div class="logo-nav-container">
      <img id="logo-img" src="logo.png" alt="logo" />
      <div class="nav-links">
        <a href="index.html">主页</a>
        <a href="rooms.html">房间列表</a>
        <a href="account.html">账号管理</a>
        <a href="admin.html" style="color: #61E8EA;">管理员控制台</a>
      </div>
    </div>
    
    <div class="user-section">
      <div id="avatar-container" class="glass-button">
        <div class="user-info" onclick="toggleDropdown()">
          <span class="username" id="username-display"></span>
          <img id="user-avatar" src="" alt="用户头像" class="user-avatar" />
        </div>

          <a href="javascript:void(0)" onclick="logout()">退出登录</a>
        </div>
      </div>
    </div>
  </header>

    <div class="admin-container">

      <div class="batch-actions">

  </main>
  
  <!-- 创建/编辑用户组模态框 -->
  <div id="group-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title" id="group-modal-title">创建用户组</h3>

  <!-- 编辑用户模态框（增加当前密码输入） -->
  <div id="edit-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">编辑用户信息</h3>
        <button class="close-modal" onclick="closeEditModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div id="edit-message" class="message"></div>
        <input type="hidden" id="edit-user-id" />
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input type="text" class="form-input" id="edit-username" />
        </div>
        <div class="form-group">
          <label class="form-label">当前管理员密码</label>
          <input type="password" class="form-input" id="edit-current-password" />
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <div class="password-display" id="password-display">************</div>
          <button class="reveal-btn" onclick="togglePasswordDisplay()">显示/隐藏密码</button>
          <input type="password" class="form-input" id="edit-password" placeholder="输入新密码" style="margin-top: 0.5rem;" />
        </div>
        <div class="form-group">
          <label class="form-label">Phira ID</label>
          <input type="text" class="form-input" id="edit-phira-id" />
        </div>
        <div class="form-row">
          <div class="form-col">
            <label class="form-label">管理员状态</label>
            <select class="form-input" id="edit-admin">
              <option value="no">否</option>
              <option value="yes">是</option>
            </select>
          </div>
          <div class="form-col">
            <label class="form-label">开发者权限</label>
            <select class="form-input" id="edit-dev">
              <option value="no">否</option>
              <option value="yes">是</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeEditModal()">取消</button>
        <button class="btn" onclick="saveUserChanges()">保存更改</button>
      </div>
    </div>
  </div>
  
  <!-- 管理员密码模态框 -->
  <div id="admin-password-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">管理员验证</h3>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">请输入管理员密码</label>
          <input type="password" class="form-input" id="admin-password-input" placeholder="管理员密码" />
        </div>
        <div id="admin-password-message" class="message"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeAdminPasswordModal()">取消</button>
        <button class="btn" onclick="verifyAdminPassword()">验证</button>
      </div>
    </div>
  </div>
  
  <script>
    // 全局变量
    let allUsers = [];
    let currentUser = null;
    // 用户组管理相关
    let allGroups = [];
  // 管理员密码（用于批量接口验证），在 verifyAdminPassword() 验证后设置
  let adminPassword = '';

    // 等待页面关键内容与资源就绪（用户/用户组渲染 & 图片加载）
    async function waitForAppReady(maxWait = 5000) {
      const start = Date.now();
      const usersBody = () => document.getElementById('users-table-body');
      const groupsList = () => document.getElementById('groups-list');

      function imagesLoaded() {
        const imgs = Array.from(document.images || []);
        return imgs.length === 0 || imgs.every(i => i.complete);
      }

      while (Date.now() - start < maxWait) {
        const usersReady = usersBody() && usersBody().children.length > 0;
        const groupsReady = groupsList() && groupsList().children.length > 0;
        if ((usersReady || groupsReady) && imagesLoaded()) return;
        // small delay and retry
        // eslint-disable-next-line no-await-in-loop
        await new Promise(r => setTimeout(r, 80));
      }
    }

    // 页面初始化：确保数据加载并在资源就绪后再隐藏加载器
    document.addEventListener('DOMContentLoaded', async () => {
      const loader = document.getElementById('page-loader');
      loader.classList.remove('hide');

      // 获取当前用户信息
      try {
        const res = await fetch('/api/auth/me');
        if (!res.ok) throw new Error('未登录');
        currentUser = await res.json();
        updateUserDisplay();
      } catch (e) {
        alert('请先登录');
        window.location.href = 'index.html';
        return;
      }

      // 加载用户列表与用户组列表
      await Promise.all([loadAllUsers(), loadAllGroups()]);

      // 等待页面主要内容与图片渲染完成再淡出加载器
      await waitForAppReady(5000);
      // 给 CSS 过渡一点时间
      setTimeout(() => loader.classList.add('hide'), 80);
    });

    // 加载所有用户数据
    async function loadAllUsers() {
      try {
        const res = await fetch('/api/auth/users');
        if (!res.ok) throw new Error('加载用户失败');
        allUsers = await res.json();
        document.getElementById('total-users').textContent = allUsers.length;
        renderUsersTable(allUsers);
      } catch (e) {
        showAdminMessage('加载用户失败', false);
      }
    }
    
    // 渲染用户表格（兼容新API）
    function renderUsersTable(users) {
      const tableBody = document.getElementById('users-table-body');
      tableBody.innerHTML = '';
      const searchName = document.getElementById('search-name').value.toLowerCase();
      const searchPhira = document.getElementById('search-phira').value.toLowerCase();
      // 过滤用户
      const filteredUsers = users.filter(user => {
        const nameMatch = (user.username || '').toLowerCase().includes(searchName);
        const phiraMatch = (String(user.phira_id) || '').toLowerCase().includes(searchPhira);
        return nameMatch && phiraMatch;
      });
      filteredUsers.forEach(user => {
        const row = document.createElement('tr');
        row.className = 'user-row';
        row.innerHTML = `
          <td><input type="checkbox" class="user-select" data-id="${user.id}" /></td>
          <td>${user.id}</td>
          <td>${user.username}</td>
          <td><img src="${user.phira_avatar || 'https://phira.moe/assets/user-6212ee95.png'}" class="user-avatar-small" /></td>
          <td>${user.phira_id || '-'}</td>
          <td>${user.phira_username || '-'}</td>
          <td>${user.phira_rks ? parseFloat(user.phira_rks).toFixed(2) : '0.00'}</td>
          <td>
            ${user.group_id === 1 ? '<span class="badge badge-admin">超级管理员</span>' : ''}
            ${user.group_id === 2 ? '<span class="badge badge-admin">管理员</span>' : ''}
            ${(user.group_id === 1 || user.group_id === 2) ? '<span class="badge badge-dev">开发者</span>' : ''}
          </td>
          <td class="actions-cell">
            <button class="action-btn btn-edit" onclick="openEditModal(${user.id})">编辑</button>
            <button class="action-btn" onclick="deleteUser(${user.id})">删除</button>
          </td>
        `;
        tableBody.appendChild(row);
      });
    }
    
    // 打开编辑用户模态框（兼容新API）
    function openEditModal(userId) {
      const user = allUsers.find(u => u.id === userId);
      if (!user) return;
      document.getElementById('edit-user-id').value = user.id;
      document.getElementById('edit-username').value = user.username;
      document.getElementById('edit-phira-id').value = user.phira_id || '';
      document.getElementById('edit-admin').value = (user.group_id === 1 || user.group_id === 2) ? 'yes' : 'no';
      document.getElementById('edit-dev').value = (user.group_id === 1 || user.group_id === 2) ? 'yes' : 'no';
      document.getElementById('edit-message').style.display = 'none';
      document.getElementById('edit-modal').style.display = 'flex';
    }
    
    // 关闭编辑用户模态框
    function closeEditModal() {
      document.getElementById('edit-modal').style.display = 'none';
    }
    
    // 切换密码显示
    function togglePasswordDisplay() {
      const display = document.getElementById('password-display');
      if (display.textContent === '************') {
        display.textContent = display.dataset.original;
      } else {
        display.textContent = '************';
      }
    }
    
    // 保存用户更改（兼容新API，增加current_password）
    async function saveUserChanges() {
      const userId = parseInt(document.getElementById('edit-user-id').value);
      const username = document.getElementById('edit-username').value;
      const password = document.getElementById('edit-password').value;
      const phiraId = document.getElementById('edit-phira-id').value;
      const admin = document.getElementById('edit-admin').value;
      const dev = document.getElementById('edit-dev').value;
      const current_password = document.getElementById('edit-current-password').value;
      let group_id = 3;
      if (admin === 'yes') group_id = 2;
      if (dev === 'yes') group_id = 2;
      if (admin === 'yes' && dev === 'yes') group_id = 1;
      const changes = { username, phira_id: phiraId, group_id, current_password };
      if (password) changes.password = password;
      try {
        const res = await fetch(`/api/auth/users/${userId}`, {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(changes)
        });
        if (!res.ok) throw new Error('更新失败');
        showEditMessage('用户信息更新成功', true);
        setTimeout(() => {
          closeEditModal();
          loadAllUsers();
        }, 1500);
      } catch (e) {
        showEditMessage('更新失败', false);
      }
    }
    // 删除用户（新API）
    async function deleteUser(userId) {
      if (!confirm('确定要删除该用户吗？')) return;
      try {
        const res = await fetch(`/api/auth/users/${userId}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('删除失败');
        showAdminMessage('用户已删除', true);
        loadAllUsers();
      } catch (e) {
        showAdminMessage('删除失败', false);
      }
    }
    
    // 显示编辑消息
    function showEditMessage(message, isSuccess) {
      const messageElement = document.getElementById('edit-message');
      messageElement.textContent = message;
      messageElement.className = `message ${isSuccess ? 'message-success' : 'message-error'}`;
      messageElement.style.display = 'block';
    }
    
    // 全选用户
    function selectAllUsers() {
      document.querySelectorAll('.user-select').forEach(checkbox => {
        checkbox.checked = true;
      });
    }
    
    // 取消全选
    function deselectAllUsers() {
      document.querySelectorAll('.user-select').forEach(checkbox => {
        checkbox.checked = false;
      });
    }
    
    // 应用批量操作
    function applyBatchAction() {
      const action = document.getElementById('batch-action').value;
      const selectedUserIds = [];
      
      document.querySelectorAll('.user-select:checked').forEach(checkbox => {
        if (checkbox.id !== 'select-all') {
          selectedUserIds.push(parseInt(checkbox.dataset.id));
        }
      });
      
      if (selectedUserIds.length === 0) {
        showAdminMessage('请选择至少一个用户', false);
        return;
      }
      
      // 确定要应用的更改
      let changes = {};
      switch (action) {
        case 'set_admin':
          changes.admin = 'yes';
          break;
        case 'remove_admin':
          changes.admin = 'no';
          break;
        case 'set_dev':
          changes.dev = 'yes';
          break;
        case 'remove_dev':
          changes.dev = 'no';
          break;
      }
      
      // 如果尚未输入管理员密码，弹出管理员密码模态框要求验证
      if (!adminPassword) {
        // 打开管理员密码模态框，验证后回调继续操作
        document.getElementById('admin-password-modal').style.display = 'flex';
        document.getElementById('admin-password-message').style.display = 'none';
        // 绑定一次性验证通过后继续提交的回调
        window._afterAdminVerified = () => {
          // 重新调用 applyBatchAction 并保留 adminPassword
          applyBatchAction();
          delete window._afterAdminVerified;
        };
        return;
      }

      fetch('/admin/batch-update', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          current_password: adminPassword,
          user_ids: selectedUserIds,
          changes
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.status === 'success') {
          // 统计成功和失败的数量
          const successCount = data.results.filter(r => r.status === 'success').length;
          const errorCount = data.results.filter(r => r.status === 'error').length;
          
          if (errorCount === 0) {
            showAdminMessage(`成功更新 ${successCount} 个用户`, true);
          } else {
            showAdminMessage(`成功更新 ${successCount} 个用户，失败 ${errorCount} 个`, false);
          }
          
          // 重新加载用户数据
          loadAllUsers();
        } else {
          showAdminMessage(data.message || '批量更新失败', false);
        }
      })
      .catch(error => {
        showAdminMessage('网络错误，请重试', false);
      });
    }
    
    // 显示管理员消息
    function showAdminMessage(message, isSuccess) {
      const messageElement = document.getElementById('admin-message');
      messageElement.textContent = message;
      messageElement.className = `message ${isSuccess ? 'message-success' : 'message-error'}`;
      messageElement.style.display = 'block';
      
      // 5秒后隐藏消息
      setTimeout(() => {
        messageElement.style.display = 'none';
      }, 5000);
    }
    
    // 加载所有用户组数据
    async function loadAllGroups() {
      try {
        const res = await fetch('/api/auth/groups');
        if (!res.ok) throw new Error('加载用户组失败');
        allGroups = await res.json();
        renderGroupsList(allGroups);
      } catch (e) {
        showGroupsMessage('加载用户组失败', false);
      }
    }
    // 渲染用户组列表
    function renderGroupsList(groups) {
      const list = document.getElementById('groups-list');
      list.innerHTML = '';
      groups.forEach(group => {
        const card = document.createElement('div');
        card.className = 'info-card';
        card.innerHTML = `
          <div class="info-title">ID: ${group.id}</div>
          <div class="info-value">${group.name}</div>
          <div class="info-value">权限: ${group.permissions}</div>
          <div class="form-actions">
            <button class="btn" onclick="openEditGroupModal(${group.id})">编辑</button>
            <button class="btn btn-outline" onclick="deleteGroup(${group.id})">删除</button>
          </div>
        `;
        list.appendChild(card);
      });
    }
    function showGroupsMessage(msg, isSuccess) {
      const el = document.getElementById('groups-message');
      el.textContent = msg;
      el.className = 'message ' + (isSuccess ? 'message-success' : 'message-error');
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 5000);
    }
    function openCreateGroupModal() {
      document.getElementById('group-modal-title').textContent = '创建用户组';
      document.getElementById('group-id').value = '';
      document.getElementById('group-name').value = '';
      document.getElementById('group-permissions').value = '';
      document.getElementById('group-password-area').style.display = 'none';
      document.getElementById('group-modal').style.display = 'flex';
      document.getElementById('group-modal-message').style.display = 'none';
      document.getElementById('group-modal-save-btn').onclick = saveGroupChanges;
    }
    function openEditGroupModal(id) {
      const group = allGroups.find(g => g.id === id);
      if (!group) return;
      document.getElementById('group-modal-title').textContent = '编辑用户组';
      document.getElementById('group-id').value = group.id;
      document.getElementById('group-name').value = group.name;
      document.getElementById('group-permissions').value = group.permissions;
      document.getElementById('group-password-area').style.display = 'block';
      document.getElementById('group-modal').style.display = 'flex';
      document.getElementById('group-modal-message').style.display = 'none';
      document.getElementById('group-modal-save-btn').onclick = saveGroupChanges;
    }
    function closeGroupModal() {
      document.getElementById('group-modal').style.display = 'none';
    }
    async function saveGroupChanges() {
      const id = document.getElementById('group-id').value;
      const name = document.getElementById('group-name').value;
      const permissions = parseInt(document.getElementById('group-permissions').value);
      const current_password = document.getElementById('group-current-password').value;
      const msgEl = document.getElementById('group-modal-message');
      msgEl.style.display = 'none';
      if (!name || isNaN(permissions)) {
        msgEl.textContent = '请填写完整信息';
        msgEl.className = 'message message-error';
        msgEl.style.display = 'block';
        return;
      }
      try {
        let res;
        if (id) {
          // 编辑
          res = await fetch(`/api/auth/groups/${id}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name, permissions, current_password })
          });
        } else {
          // 创建
          res = await fetch('/api/auth/groups', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name, permissions })
          });
        }
        if (!res.ok) throw new Error('操作失败');
        msgEl.textContent = '保存成功';
        msgEl.className = 'message message-success';
        msgEl.style.display = 'block';
        setTimeout(() => {
          closeGroupModal();
          loadAllGroups();
        }, 1200);
      } catch (e) {
        msgEl.textContent = '操作失败';
        msgEl.className = 'message message-error';
        msgEl.style.display = 'block';
      }
    }
    async function deleteGroup(id) {
      if (!confirm('确定要删除该用户组吗？')) return;
      try {
        const res = await fetch(`/api/auth/groups/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('删除失败');
        showGroupsMessage('用户组已删除', true);
        loadAllGroups();
      } catch (e) {
        showGroupsMessage('删除失败', false);
      }
    }
    // 页面加载时加载用户组
    document.addEventListener('DOMContentLoaded', loadAllGroups);
    
    // 绑定搜索和过滤事件
    document.getElementById('search-name').addEventListener('input', () => renderUsersTable(allUsers));
    document.getElementById('search-phira').addEventListener('input', () => renderUsersTable(allUsers));
    document.getElementById('filter-admin').addEventListener('change', () => renderUsersTable(allUsers));
    document.getElementById('filter-dev').addEventListener('change', () => renderUsersTable(allUsers));
    
    // 全选/取消全选
    document.getElementById('select-all').addEventListener('change', function() {
      document.querySelectorAll('.user-select').forEach(checkbox => {
        checkbox.checked = this.checked;
      });
    });
    
    // 复用account.html中的函数
    function updateUserDisplay() {
      if (currentUser) {
        document.getElementById('username-display').textContent = currentUser.username;
        document.getElementById('user-avatar').src = currentUser.phira_avatar || 'https://phira.moe/assets/user-6212ee95.png';
        document.getElementById('dropdown-username').textContent = currentUser.username;
        const phiraLink = document.getElementById('phira-profile-link');
        if (phiraLink && currentUser.phira_id) {
          phiraLink.href = `https://phira.moe/user/${currentUser.phira_id}`;
        }
      }
    }
    
    function toggleDropdown() {
      const dropdown = document.getElementById('user-dropdown');
      if (dropdown) {
        dropdown.classList.toggle('show');
      }
    }

    // 关闭管理员密码模态框并清理状态
    function closeAdminPasswordModal() {
      const modal = document.getElementById('admin-password-modal');
      const input = document.getElementById('admin-password-input');
      const msg = document.getElementById('admin-password-message');
      if (modal) modal.style.display = 'none';
      if (input) input.value = '';
      if (msg) {
        msg.style.display = 'none';
        msg.textContent = '';
      }
    }

    // 验证管理员密码：使用当前用户用户名调用登录接口进行密码校验，校验成功后保存 adminPassword 并触发后续回调
    async function verifyAdminPassword() {
      const input = document.getElementById('admin-password-input');
      const msg = document.getElementById('admin-password-message');
      if (!input || !msg) return;
      msg.style.display = 'none';
      const password = input.value || '';
      if (!password) {
        msg.textContent = '请输入管理员密码';
        msg.className = 'message message-error';
        msg.style.display = 'block';
        return;
      }
      if (!currentUser || !currentUser.username) {
        msg.textContent = '未检测到当前用户，请先登录';
        msg.className = 'message message-error';
        msg.style.display = 'block';
        return;
      }
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ username: currentUser.username, password, remember: false })
        });
        if (!res.ok) {
          const data = await res.json().catch(() => null);
          throw new Error((data && data.message) || '验证失败');
        }
        // 验证成功，保存密码并关闭模态框，然后触发一轮回调（如果有）
        adminPassword = password;
        msg.textContent = '验证成功';
        msg.className = 'message message-success';
        msg.style.display = 'block';
        setTimeout(() => {
          closeAdminPasswordModal();
          if (window._afterAdminVerified) {
            try { window._afterAdminVerified(); } catch (e) { /* ignore */ }
            delete window._afterAdminVerified;
          }
        }, 600);
      } catch (e) {
        msg.textContent = e.message || '验证失败';
        msg.className = 'message message-error';
        msg.style.display = 'block';
      }
    }
    
    function logout() {
      localStorage.removeItem('user');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
