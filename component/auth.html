  <!-- 登录注册模板（由 js/auth-window.js 使用 mac-window 打开） -->
  <template id="auth-template">
    <div class="modal-content glass-card" id="auth-box">
      <h3 id="auth-title">用户登录</h3>
      <input id="auth-name" placeholder="用户名" />
      <input id="auth-password" type="password" placeholder="密码" />
      <input id="auth-phiraid" class="collapsed" placeholder="Phira ID"/>
      
      <label class="checkbox-container" id="remember-me-container">
        <div class="glass-checkbox">
          <input type="checkbox" id="remember-me">
        </div>
        <span class="checkbox-text">记住我</span>
      </label>
      
      <label id="agreement-container" class="checkbox-container" style="display: none;">
        <div class="glass-checkbox">
          <input type="checkbox" id="agree-terms" required>
        </div>
        <span class="checkbox-text">我同意<a href="https://phira.htadiy.cc/privacy.html" target="_blank">用户协议</a></span>
      </label>
      
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.6rem">
        <button id="auth-submit">确认</button>
        <button id="auth-toggle">切换登录 / 注册</button>
      </div>
      <p id="auth-msg" style="margin-top:0.5rem;font-size:0.8rem;color:#ffccaa;"></p>
    </div>
  </template>
  <style>
    .checkbox-container {
      display: flex;
      align-items: center;
      margin: 0.5rem 0;
      gap: 0.5rem;
      flex-wrap: nowrap;
      cursor: pointer;
    }
    .checkbox-container input[type="checkbox"] {
      margin-right: 0.5rem;
    }
  </style>
