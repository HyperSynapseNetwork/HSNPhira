<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="description" content="HyperSynapse Network 用户账号管理" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>账号管理 - HyperSynapse Phira</title>
  <link rel="stylesheet" type="text/css" href="./css/style.css">
  <link rel="stylesheet" type="text/css" href="./css/account.css">
</head>
<body>
  <!-- 页面加载动画 -->
  <div id="page-loader">
    <div class="load_11">
      <div class="rect1"></div>
      <div class="rect2"></div>
      <div class="rect3"></div>
      <div class="rect4"></div>
      <div class="rect5"></div>
    </div>
  </div>
  <div class="parallax-bg"></div>
  
  <div id="header"></div>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $('#header').load('header.html');
  </script>
  
  <main id="main-content" style="opacity:0;transition:opacity 0.6s;">
    <div class="account-container glass-panel">
      <div class="account-header">
        <div class="account-avatar">
          <img id="user-avatar-large" src="" alt="用户头像" class="account-avatar">
        </div>
        <div class="account-info">
          <h1 class="account-name" id="account-name">加载中...</h1>
          <p class="account-subtitle">用户ID: <span id="account-id">-</span></p>
          <p class="account-subtitle">Phira ID: <span id="phira-id">-</span></p>
          <div class="account-badges" id="account-badges"></div>
        </div>
        <div class="account-stats">
          <div class="stat-item">
            <div class="stat-value" id="rks-value">0.00</div>
            <div class="stat-label">RKS</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="join-date">-</div>
            <div class="stat-label">注册日期</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">
              <span class="status-indicator status-active"></span>
              <span>在线</span>
            </div>
            <div class="stat-label">状态</div>
          </div>
        </div>
      </div>
      
      <div class="form-section">
        <h2 class="section-title">账户信息</h2>
        
        <div class="info-grid">
          <div class="info-card">
            <div class="info-title">用户名</div>
            <div class="info-value" id="info-username">-</div>
          </div>
          <div class="info-card">
            <div class="info-title">Phira 用户名</div>
            <div class="info-value" id="phira-name">-</div>
          </div>
          <div class="info-card">
            <div class="info-title">账户状态</div>
            <div class="info-value">激活 <span class="status-indicator status-active"></span></div>
          </div>
          <div class="info-card">
            <div class="info-title">最后登录</div>
            <div class="info-value" id="last-login">-</div>
          </div>
        </div>
      </div>
      
      <div class="form-section">
        <h2 class="section-title">修改用户名</h2>
        
        <div id="username-message" class="message"></div>
        
        <div class="form-group">
          <label class="form-label">新用户名</label>
          <input type="text" class="form-input" id="new-username" placeholder="输入新的用户名">
        </div>
        
        <div class="form-group">
          <label class="form-label">当前密码</label>
          <input type="password" class="form-input" id="username-password" placeholder="输入当前密码以确认">
        </div>
        
        <div class="form-actions">
          <button class="btn btn-outline" onclick="resetUsernameForm()">重置</button>
          <button class="btn" onclick="updateUsername()">更新用户名</button>
        </div>
      </div>
      
      <div class="form-section">
        <h2 class="section-title">修改密码</h2>
        
        <div id="password-message" class="message"></div>
        
        <div class="form-row">
          <div class="form-col">
            <div class="form-group">
              <label class="form-label">当前密码</label>
              <input type="password" class="form-input" id="current-password" placeholder="输入当前密码">
            </div>
          </div>
          <div class="form-col">
            <div class="form-group">
              <label class="form-label">新密码</label>
              <input type="password" class="form-input" id="new-password" placeholder="输入新密码">
            </div>
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label">确认新密码</label>
          <input type="password" class="form-input" id="confirm-password" placeholder="再次输入新密码">
        </div>
        
        <div class="form-actions">
          <button class="btn btn-outline" onclick="resetPasswordForm()">重置</button>
          <button class="btn" onclick="updatePassword()">更新密码</button>
        </div>
      </div>
      
      <div class="form-section">
        <h2 class="section-title">权限信息</h2>
        
        <div class="info-grid" id="permissions-grid">
          <div class="info-card">
            <div class="info-title">系统管理员</div>
            <div class="info-value">
              <span id="admin-status">否</span>
            </div>
          </div>
          <div class="info-card">
            <div class="info-title">用户管理权限</div>
            <div class="info-value">
              <span id="user-management-status">否</span>
            </div>
          </div>
          <div class="info-card">
            <div class="info-title">用户组管理权限</div>
            <div class="info-value">
              <span id="group-management-status">否</span>
            </div>
          </div>
        </div>
        
        <div class="form-group">
          <p style="color: #aaa; margin-top: 1.5rem;">
            注意：权限状态由系统管理员设置，普通用户无法自行修改。
            如需权限变更，请联系系统管理员。
          </p>
        </div>
      </div>
    </div>
  </main>

  <!-- 登录注册弹窗 -->
  <div id="auth-modal" class="modal" style="z-index: 99999; display: none;">
    <div class="modal-content glass-card" id="auth-box">
      <h3 id="auth-title">用户登录</h3>
      <input id="auth-name" placeholder="用户名" />
      <input id="auth-password" type="password" placeholder="密码" />
      <input id="auth-phiraid" class="collapsed" placeholder="Phira ID (仅注册)"/>
      <input id="auth-password-confirm" type="password" placeholder="确认密码" style="display:none;" />
      <div class="checkbox-container">
        <input type="checkbox" id="remember-me">
        <label for="remember-me" style="margin-left:8px;">记住我</label>
      </div>
      <div id="agreement-container" class="checkbox-container" style="display: none;">
        <input type="checkbox" id="agree-terms" required>
        <label for="agree-terms" style="margin-left:8px;">我同意<a href="https://phira.htadiy.cc/privacy.html" target="_blank">用户协议</a></label>
      </div>
      <button onclick="submitAuth()">确认</button>
      <p id="auth-msg" style="margin-top:0.5rem;font-size:0.8rem;color:#ffccaa;"></p>
      <button onclick="toggleAuthMode()" style="margin-top:1rem">切换登录 / 注册</button>
      <button class="btn btn-outline" onclick="closeAuth()">关闭</button>
    </div>
  </div>

  <script>
    // 扩大卡片倾斜范围，越靠边倾斜越小，回正过程平滑
    document.addEventListener('DOMContentLoaded', () => {
      const accountContainer = document.querySelector('.account-container');
      if (accountContainer) {
        document.addEventListener('mousemove', (e) => {
          const winW = window.innerWidth;
          const winH = window.innerHeight;
          const centerX = winW / 2;
          const centerY = winH / 2;
          const relX = (e.clientX - centerX) / centerX;
          const relY = (e.clientY - centerY) / centerY;
          const maxAngle = 6;
          const rotateY = relX * maxAngle * (1 - Math.abs(relX) * 0.7);
          const rotateX = -relY * maxAngle * (1 - Math.abs(relY) * 0.7);
          accountContainer.style.transition = 'transform 0.5s cubic-bezier(.4,2,.3,1)';
          accountContainer.style.transform = `translateZ(20px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });
        document.addEventListener('mouseleave', () => {
          accountContainer.style.transition = 'transform 1.2s cubic-bezier(.4,2,.3,1)';
          accountContainer.style.transform = 'translateZ(20px) rotateX(0deg) rotateY(0deg)';
        });
      }
    });
    // 默认头像URL
    const DEFAULT_AVATAR = 'https://phira.moe/assets/user-6212ee95.png';
    let currentUser = null;
    let authMode = 'login';
    
    // 页面加载时检查登录状态
    document.addEventListener('DOMContentLoaded', async () => {
      // 添加3D卡片交互效果
      const accountContainer = document.querySelector('.account-container');
      
      if (accountContainer) {
        accountContainer.addEventListener('mousemove', (e) => {
          if (!accountContainer.classList.contains('tilting')) {
            accountContainer.classList.add('tilting');
          }
          
          const rect = accountContainer.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const centerX = rect.width / 2;
          const centerY = rect.height / 2;
          
          const rotateY = (x - centerX) / centerX * 8;
          const rotateX = (centerY - y) / centerY * 8;
          
          accountContainer.style.transform = `translateZ(20px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });
         
        accountContainer.addEventListener('mouseleave', () => {
          accountContainer.classList.remove('tilting');
          accountContainer.style.transform = 'translateZ(20px) rotateX(0) rotateY(0)';
          
          // 重新启用轻微晃动动画
          setTimeout(() => {
            accountContainer.style.animation = 'gentleSway 8s infinite ease-in-out';
          }, 300);
        });
      }
      
  // 检查会话状态
      try {
        const response = await fetch('/api/auth/me');
        if (response.ok) {
          currentUser = await response.json();
          updateUserDisplay();
          await loadAccountDetails();
          // 等待主内容准备并安装 overlay，避免毛玻璃闪烁
          await waitForAppReady(3000);
          installAccountTiltOverlay();
          // 窗口滚动时重新计算 overlay 位置
          window.addEventListener('scroll', () => installAccountTiltOverlay());
        } else {
          document.getElementById('login-button').style.display = 'flex';
        }
      } catch (error) {
        console.error('检查会话失败:', error);
        document.getElementById('login-button').style.display = 'flex';
      }
      // 等待资源渲染并执行一次回流，然后短延迟隐藏 loader，避免毛玻璃闪烁
      const mainContent = document.getElementById('main-content');
      if (mainContent) {
        void mainContent.offsetHeight; // 强制回流
        mainContent.style.opacity = 1;
      }
      const loader = document.getElementById('page-loader');
  if (loader) setTimeout(() => loader.classList.add('hide'), 120);

      // 兼容性修复：如果 .glass-checkbox 无法响应点击，使用事件委托切换 checkbox
      document.addEventListener('click', (e) => {
        const box = e.target.closest && e.target.closest('.glass-checkbox');
        if (!box) return;
        const input = box.querySelector('input[type="checkbox"]');
        if (!input) return;
        if (e.target === input) return;
        input.checked = !input.checked;
        input.dispatchEvent(new Event('change', { bubbles: true }));
      });

      // 视觉同步：当 checkbox 的 checked 状态改变时，切换容器上的 .checked class
      document.addEventListener('change', (e) => {
        const input = e.target;
        if (!input || input.type !== 'checkbox') return;
        const box = input.closest && input.closest('.glass-checkbox');
        if (!box) return;
        if (input.checked) box.classList.add('checked'); else box.classList.remove('checked');
      });
    });
    
    // 加载账户详细信息
  async function loadAccountDetails() {
      if (!currentUser) return;
      
      // 设置用户数据
      document.getElementById('account-name').textContent = currentUser.username;
      document.getElementById('username-display').textContent = currentUser.username;
      document.getElementById('dropdown-username').textContent = currentUser.username;
      document.getElementById('account-id').textContent = currentUser.id;
      document.getElementById('phira-id').textContent = currentUser.phira_id;
      document.getElementById('phira-name').textContent = currentUser.phira_username;
      document.getElementById('info-username').textContent = currentUser.username;
      document.getElementById('rks-value').textContent = currentUser.phira_rks ? parseFloat(currentUser.phira_rks).toFixed(2) : '0.00';
      
      // 设置头像
      const avatarUrl = currentUser.phira_avatar || DEFAULT_AVATAR;
      document.getElementById('user-avatar').src = avatarUrl;
      document.getElementById('user-avatar-large').src = avatarUrl;
      
      // 设置注册日期
      document.getElementById('join-date').textContent = formatDate(currentUser.register_time);
      
      // 设置最后登录时间
      document.getElementById('last-login').textContent = formatDate(currentUser.last_login_time);
      
      // 设置权限信息
      document.getElementById('admin-status').textContent = (currentUser.permissions & 0xFFFFFFFF) === 0xFFFFFFFF ? "是" : "否";
      document.getElementById('user-management-status').textContent = (currentUser.permissions & 0x00000002) ? "是" : "否";
      document.getElementById('group-management-status').textContent = (currentUser.permissions & 0x00000004) ? "是" : "否";
      
      // 更新权限徽章
      const badgesContainer = document.getElementById('account-badges');
      badgesContainer.innerHTML = '';
      
      if ((currentUser.permissions & 0xFFFFFFFF) === 0xFFFFFFFF) {
        const adminBadge = document.createElement('span');
        adminBadge.className = 'badge badge-admin';
        adminBadge.textContent = '管理员';
        badgesContainer.appendChild(adminBadge);
      }
      
      if (currentUser.permissions & 0x00000002) {
        const userMgmtBadge = document.createElement('span');
        userMgmtBadge.className = 'badge badge-admin';
        userMgmtBadge.textContent = '用户管理';
        badgesContainer.appendChild(userMgmtBadge);
      }
      
      if (currentUser.permissions & 0x00000004) {
        const groupMgmtBadge = document.createElement('span');
        groupMgmtBadge.className = 'badge badge-dev';
        groupMgmtBadge.textContent = '用户组管理';
        badgesContainer.appendChild(groupMgmtBadge);
      }
    }
    
    // 格式化日期
    function formatDate(dateString) {
  if (!dateString) return '-';
  const date = new Date(dateString);
  // 转换为北京时间（UTC+8）
  const beijingDate = new Date(date.getTime() + 8 * 60 * 60 * 1000);
  return beijingDate.toLocaleString('zh-CN', { hour12: false });
    }

    // 等待页面主要内容与图片就绪后再隐藏加载器，避免毛玻璃闪烁
    async function waitForAppReady(maxWait = 3000) {
      const start = Date.now();
      const nameEl = document.getElementById('account-name');
      function imagesLoaded() {
        const imgs = Array.from(document.images || []);
        return imgs.length === 0 || imgs.every(i => i.complete);
      }
      while (Date.now() - start < maxWait) {
        const nameReady = nameEl && nameEl.textContent && !nameEl.textContent.includes('加载中');
        if (nameReady && imagesLoaded()) return;
        // eslint-disable-next-line no-await-in-loop
        await new Promise(r => setTimeout(r, 80));
      }
    }
    
    // 更新用户显示区域
    function updateUserDisplay() {
      const loginButton = document.getElementById('login-button');
      const avatarContainer = document.getElementById('avatar-container');
      
      if (currentUser) {
        // 隐藏登录按钮
        if (loginButton) loginButton.style.display = 'none';
        
        // 显示头像容器
        if (avatarContainer) avatarContainer.style.display = 'flex';
        
        // 更新用户名和头像
        if (document.getElementById('username-display')) {
          document.getElementById('username-display').textContent = currentUser.username;
        }
        if (document.getElementById('user-avatar')) {
          document.getElementById('user-avatar').src = currentUser.phira_avatar || DEFAULT_AVATAR;
        }
        if (document.getElementById('dropdown-username')) {
          document.getElementById('dropdown-username').textContent = currentUser.username;
        }
      } else {
        // 显示登录按钮
        if (loginButton) loginButton.style.display = 'flex';
        
        // 隐藏头像容器
        if (avatarContainer) avatarContainer.style.display = 'none';
      }
    }
    
    // 重置用户名表单
    function resetUsernameForm() {
      document.getElementById('new-username').value = '';
      document.getElementById('username-password').value = '';
      hideMessage('username-message');
    }
    
    // 重置密码表单
    function resetPasswordForm() {
      document.getElementById('current-password').value = '';
      document.getElementById('new-password').value = '';
      document.getElementById('confirm-password').value = '';
      hideMessage('password-message');
    }
    
    // 显示消息
    function showMessage(elementId, message, isSuccess) {
      const messageElement = document.getElementById(elementId);
      messageElement.textContent = message;
      messageElement.className = 'message ' + (isSuccess ? 'message-success' : 'message-error');
      messageElement.style.display = 'block';
      
      // 5秒后隐藏消息
      setTimeout(() => {
        hideMessage(elementId);
      }, 5000);
    }
    
    // 隐藏消息
    function hideMessage(elementId) {
      const messageElement = document.getElementById(elementId);
      messageElement.style.display = 'none';
    }
    
    // 更新用户名
    async function updateUsername() {
      const newUsername = document.getElementById('new-username').value;
      const password = document.getElementById('username-password').value;
      
      if (!newUsername) {
        showMessage('username-message', '请输入新的用户名', false);
        return;
      }
      
      if (!password) {
        showMessage('username-message', '请输入当前密码', false);
        return;
      }
      
      try {
        const response = await fetch(`/api/auth/users/${currentUser.id}`, {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            username: newUsername,
            current_password: password
          })
        });
        
        if (!response.ok) {
          const errorData = await response.json();
          showMessage('username-message', errorData.message || '更新失败', false);
          return;
        }
        
        // 更新本地显示
        currentUser.username = newUsername;
        document.getElementById('account-name').textContent = newUsername;
        document.getElementById('info-username').textContent = newUsername;
        document.getElementById('username-display').textContent = newUsername;
        document.getElementById('dropdown-username').textContent = newUsername;
        
        showMessage('username-message', '用户名更新成功！', true);
        resetUsernameForm();
      } catch (error) {
        showMessage('username-message', '网络错误，请重试', false);
      }
    }
    
    // 更新密码
    async function updatePassword() {
      const currentPassword = document.getElementById('current-password').value;
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      
      if (!currentPassword) {
        showMessage('password-message', '请输入当前密码', false);
        return;
      }
      
      if (!newPassword) {
        showMessage('password-message', '请输入新密码', false);
        return;
      }
      
      if (newPassword.length < 6) {
        showMessage('password-message', '密码长度至少为6个字符', false);
        return;
      }
      
      if (newPassword !== confirmPassword) {
        showMessage('password-message', '新密码与确认密码不匹配', false);
        return;
      }
      
      try {
        const response = await fetch(`/api/auth/users/${currentUser.id}`, {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            current_password: currentPassword,
            password: newPassword
          })
        });
        
        if (!response.ok) {
          const errorData = await response.json();
          showMessage('password-message', errorData.message || '更新失败', false);
          return;
        }
        
        showMessage('password-message', '密码更新成功！', true);
        resetPasswordForm();
      } catch (error) {
        showMessage('password-message', '网络错误，请重试', false);
      }
    }
    
    // 以下是登录/注册相关功能
    function openAuth() {
      document.getElementById('auth-modal').style.display = 'flex';
      document.getElementById('auth-msg').textContent = '';
      updateAuthUI();
    }
    
    function closeAuth() {
      document.getElementById('auth-modal').style.display = 'none';
    }
    
    function toggleAuthMode() {
      authMode = authMode === 'login' ? 'register' : 'login';
      updateAuthUI();
      
      // 显示/隐藏用户协议复选框
      const agreementContainer = document.getElementById('agreement-container');
      agreementContainer.style.display = authMode === 'register' ? 'block' : 'none';
    }
    
    function updateAuthUI() {
      var title = document.getElementById('auth-title');
      var phiraid = document.getElementById('auth-phiraid');
      var passwordConfirm = document.getElementById('auth-password-confirm');
      if (authMode === 'login') {
        title.textContent = '用户登录';
        phiraid.classList.add('collapsed');
        passwordConfirm.style.display = 'none';
      }
      else {
        title.textContent = '用户注册';
        phiraid.classList.remove('collapsed');
        passwordConfirm.style.display = 'block';
      }
    }
    
    async function submitAuth() {
      const username = document.getElementById('auth-name').value;
      const password = document.getElementById('auth-password').value;
      const phira_id = document.getElementById('auth-phiraid').value;
      const rememberMe = document.getElementById('remember-me').checked;
      const agreeTerms = authMode === 'register' ? document.getElementById('agree-terms').checked : true;
      const msg = document.getElementById('auth-msg');
      msg.textContent = '处理中...';
    
      try {
        // 注册时需要确认用户协议
        if (authMode === 'register' && !agreeTerms) {
          msg.textContent = '请同意用户协议';
          return;
        }
        
        const endpoint = authMode === 'login' 
          ? '/api/auth/login'
          : '/api/auth/users';
          
        const payload = authMode === 'login'
          ? { username, password, remember: rememberMe }
          : { username, password, phira_id };
        
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });
        
        if (!res.ok) {
          const errorData = await res.json();
          msg.textContent = errorData.message || '操作失败';
          return;
        }
        
        // 登录成功后获取用户信息
        if (authMode === 'login') {
          const userRes = await fetch('/api/auth/me');
          if (!userRes.ok) {
            msg.textContent = '获取用户信息失败';
            return;
          }
          currentUser = await userRes.json();
          updateUserDisplay();
          loadAccountDetails();
        }
        
        msg.textContent = authMode === 'login' ? '登录成功！' : '注册成功！';
        setTimeout(() => {
          closeAuth();
          if (authMode === 'register') {
            authMode = 'login';
            updateAuthUI();
          }
          msg.textContent = '';
        }, 1000);
      } catch (e) {
        msg.textContent = '网络错误';
        console.error('认证错误:', e);
      }
    }
    
    // 退出登录
    async function logout() {
      try {
        await fetch('/api/auth/logout', { method: 'POST' });
        currentUser = null;
        window.location.reload();
      } catch (error) {
        console.error('登出失败:', error);
      }
    }
    
    // 切换下拉菜单显示状态
    function toggleDropdown() {
      const dropdown = document.getElementById('user-dropdown');
      if (dropdown) {
        dropdown.classList.toggle('show');
      }
    }
    
    // 点击其他地方关闭下拉菜单
    document.addEventListener('click', (e) => {
      const dropdown = document.getElementById('user-dropdown');
      const userInfo = document.querySelector('.user-info');
      if (dropdown && dropdown.classList.contains('show') && 
          !e.target.closest('.user-info') && 
          !e.target.closest('.dropdown-content')) {
        dropdown.classList.remove('show');
      }
    });

    // 安装 account 的倾斜 overlay：扩大触发区域并降低最大倾斜角度以获得更平滑的过渡
    function installAccountTiltOverlay() {
      const container = document.querySelector('.account-container');
      if (!container) return;
      const existing = document.getElementById('account-tilt-overlay');
      if (existing) existing.remove();
      const rect = container.getBoundingClientRect();
      const overlay = document.createElement('div');
      overlay.id = 'account-tilt-overlay';
      const scale = 1.6; // 略大于 sqrt(2)，扩大触发范围
      const w = rect.width * scale;
      const h = rect.height * scale;
      overlay.style.width = w + 'px';
      overlay.style.height = h + 'px';
      overlay.style.left = (rect.left + (rect.width - w) / 2) + 'px';
      overlay.style.top = (rect.top + (rect.height - h) / 2) + 'px';
      overlay.style.position = 'fixed';
      overlay.style.background = 'transparent';
      // 允许点击穿透：overlay 不阻塞指针事件，使用全局 mousemove 计算倾斜
      overlay.style.pointerEvents = 'none';
      overlay.style.zIndex = 1002;
      document.body.appendChild(overlay);
      // 使用 window mousemove 允许点击穿透并在离开 overlay 区域时回正
      if (existing && existing._handler) {
        window.removeEventListener('mousemove', existing._handler);
      }
      let isHovering = false;
      function onGlobalMouseMove(e) {
        const orect = overlay.getBoundingClientRect();
        const inside = e.clientX >= orect.left && e.clientX <= orect.right && e.clientY >= orect.top && e.clientY <= orect.bottom;
        if (!inside) {
          if (isHovering) {
            isHovering = false;
            container.classList.remove('tilting');
            container.style.transition = 'transform 0.6s cubic-bezier(.4,2,.3,1)';
            container.style.transform = 'translateZ(20px) rotateX(0deg) rotateY(0deg)';
          }
          return;
        }
        isHovering = true;
        const r = container.getBoundingClientRect();
        const centerX = r.left + r.width / 2;
        const centerY = r.top + r.height / 2;
        const dx = e.clientX - centerX;
        const dy = e.clientY - centerY;
        const maxDist = Math.hypot(r.width/2, r.height/2);
        const dist = Math.hypot(dx, dy);
        const ratio = Math.min(1, dist / maxDist);
        const maxAngle = 6; // 更小的最大角度
        const angle = ratio * maxAngle;
        const rotateY = (dx / maxDist) * angle;
        const rotateX = -(dy / maxDist) * angle;
        container.classList.add('tilting');
        container.style.transform = `translateZ(20px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      }
      window.addEventListener('mousemove', onGlobalMouseMove);
      overlay._handler = onGlobalMouseMove;

      window.addEventListener('resize', () => {
        const r = container.getBoundingClientRect();
        const w2 = r.width * scale;
        const h2 = r.height * scale;
        overlay.style.width = w2 + 'px';
        overlay.style.height = h2 + 'px';
        overlay.style.left = (r.left + (r.width - w2) / 2) + 'px';
        overlay.style.top = (r.top + (r.height - h2) / 2) + 'px';
      });
    }
  </script>
