<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="description" content="HyperSynapse Network 提供免费、稳定、低延迟的 Phira 多人音乐游戏服务器" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="screen-orientation" content="landscape">
  <title>房间列表 - HyperSynapse Phira</title>
  <style>
    /* 页面加载动画样式（五条竖条弹跳） */
    #page-loader {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.95);
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s;
      opacity: 1;
      pointer-events: auto;
    }
    #page-loader.hide {
      opacity: 0;
      pointer-events: none;
    }
    .load_11 {
      width: 50px;
      height: 40px;
      display: inline-block;
      text-align: center;
      font-size: 10px;
    }
    .load_11 > div {
      background-color: #61E8EA;
      height: 100%;
      width: 6px;
      display: inline-block;
      -webkit-animation: sk-stretchdelay 1.2s infinite ease-in-out;
      animation: sk-stretchdelay 1.2s infinite ease-in-out;
    }
    .load_11 .rect2 {
      -webkit-animation-delay: -1.1s;
      animation-delay: -1.1s;
    }
    .load_11 .rect3 {
      -webkit-animation-delay: -1.0s;
      animation-delay: -1.0s;
    }
    .load_11 .rect4 {
      -webkit-animation-delay: -0.9s;
      animation-delay: -0.9s;
    }
    .load_11 .rect5 {
      -webkit-animation-delay: -0.8s;
      animation-delay: -0.8s;
    }
    @-webkit-keyframes sk-stretchdelay {
      0%, 40%, 100% { -webkit-transform: scaleY(0.4) }
      20% { -webkit-transform: scaleY(1.0) }
    }
    @keyframes sk-stretchdelay {
      0%, 40%, 100% {
        transform: scaleY(0.4);
        -webkit-transform: scaleY(0.4);
      }
      20% {
        transform: scaleY(1.0);
        -webkit-transform: scaleY(1.0);
      }
    }
    /* 文字悬停效果 */
    /* 文字悬停效果（去下划线，发光晕） */
    th:hover, td:hover, .status:hover, .modal-content h3:hover, .chart-name-btn:hover {
      color: #61E8EA !important;
      text-shadow: 0 0 8px #61E8EA88, 0 0 2px #61E8EA;
      cursor: pointer;
      transition: color 0.2s, text-shadow 0.2s;
      text-decoration: none;
    }

    /* 卡片悬停效果 */
    table:hover, .modal-content:hover, .glass-card:hover {
      background: rgba(255,255,255,0.12);
      box-shadow: 0 8px 32px rgba(97,232,234,0.25), 0 2px 8px rgba(0,0,0,0.18);
      border: 1.5px solid #61E8EA;
      transform: scale(1.03);
      transition: all 0.25s cubic-bezier(.4,2,.3,1);
      z-index: 2;
    }

    /* 用户协议链接样式 */
    #agreement-container a {
      color: #61E8EA !important;
      text-decoration: none !important;
      font-weight: bold;
    }

    /* 复选框容器修复 */
    .checkbox-container {
      display: flex;
      align-items: center;
      margin: 0.5rem 0;
      justify-content: flex-start;
    }
    .glass-checkbox {
      position: relative;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 0;
    }
    .glass-checkbox input[type="checkbox"] {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 22px;
      height: 22px;
      border-radius: 8px;
      background: #fff;
      border: 2px solid #61E8EA;
      box-shadow: 0 1px 4px rgba(97,232,234,0.08);
      accent-color: #61E8EA;
      margin: 0;
    } /* 修复：添加闭合花括号 */
    
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #000;
      color: #eee;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }
    .parallax-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image: url('https://webstatic.cn-nb1.rains3.com/5712%C3%973360.jpeg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }
    header {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 1.5rem;
      backdrop-filter: blur(12px);
      background: rgba(0, 0, 0, 0.4);
      z-index: 1000;
      box-sizing: border-box;
    }
    .logo-nav-container {
      display: flex;
      align-items: center;
      flex: 1;
    }
    #logo-img {
      height: 32px;
      margin-right: 1.2rem;
    }
    .nav-links {
      display: flex;
    }
    .nav-links a {
      color: #eee;
      margin-right: 1.2rem;
      text-decoration: none;
      transition: 0.3s;
      font-size: 0.95rem;
    }
    .nav-links a:hover {
      color: #fff;
      text-shadow: 0 0 4px #fff;
    }
    .user-section {
      display: flex;
      justify-content: flex-end;
      flex: 1;
    }
    .glass-button {
      display: flex;
      align-items: center;
      padding: 0.4rem 1rem;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 100px;
    }
    .glass-button:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(1.05);
    }
    .login-btn {
      color: #eee;
      text-decoration: none;
      font-size: 0.95rem;
      white-space: nowrap;
      width: 100%;
      text-align: center;
    }
    .user-info {
      display: flex;
      align-items: center;
      position: relative;
      cursor: pointer;
      width: 100%;
    }
    .username {
      margin-right: 0.8rem;
      font-size: 0.95rem;
      color: #eee;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .user-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .dropdown-content {
      position: absolute;
      top: 100%;
      right: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 8px;
      padding: 0.8rem;
      min-width: 160px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      z-index: 1001;
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px);
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .dropdown-content.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .dropdown-content span {
      display: block;
      padding: 0.3rem 0.5rem;
      font-weight: bold;
      color: #a1e5ef;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 0.5rem;
    }
    .dropdown-content a {
      display: block;
      padding: 0.5rem;
      color: #eee;
      text-decoration: none;
      border-radius: 4px;
      transition: all 0.3s ease;
    }
    .dropdown-content a:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }
    main {
      position: relative;
      z-index: 2;
      padding-top: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .status {
      margin-bottom: 1rem;
      font-size: 1.2rem;
      text-align: center;
      padding: 0.5rem;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(6px);
      width: 95%;
      max-width: 800px;
    }
    .status.online { 
      color: #0f0; 
      border: 1px solid rgba(0, 255, 0, 0.2);
    }
    .status.offline { 
      color: #f33; 
      border: 1px solid rgba(255, 0, 0, 0.2);
    }
    
    /* 3D卡片容器样式 */
    #table-container {
      perspective: 1000px;
      width: 95%;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* 3D毛玻璃卡片效果 */
    table {
      border-collapse: collapse;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      overflow: hidden;
      backdrop-filter: blur(8px);
      animation: fadeIn 1s ease-out, gentleSway 8s infinite ease-in-out;
      width: 100%;
      transform-style: preserve-3d;
      transform: translateZ(20px);
      transition: transform 0.3s cubic-bezier(.4,2,.3,1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    @keyframes gentleSway {
      0%, 100% { transform: translateZ(20px) rotateX(0.5deg) rotateY(0.5deg); }
      25% { transform: translateZ(20px) rotateX(-0.5deg) rotateY(-1deg); }
      50% { transform: translateZ(20px) rotateX(0.5deg) rotateY(1deg); }
      75% { transform: translateZ(20px) rotateX(-0.5deg) rotateY(0.5deg); }
    }

    table.tilting {
      animation: none;
      transition: transform 0.1s linear;
    }
    
    table.hovering {
      animation: gentleHover 2s infinite cubic-bezier(.4,2,.3,1);
    }
    
    @keyframes gentleHover {
      0%, 100% { transform: translateZ(20px) translateY(0); }
      50% { transform: translateZ(20px) translateY(-5px); }
    }
    
    th, td {
      padding: 0.8rem 1rem;
      text-align: left;
      font-size: 0.9rem;
    }
    th {
      background: rgba(255, 255, 255, 0.1);
      font-weight: bold;
      color: #a1e5ef;
    }
    tr:nth-child(even) {
      background: rgba(255, 255, 255, 0.03);
    }
    .dl-btn, .chart-btn {
      padding: 0.3rem 0.8rem;
      font-size: 0.85rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      border-radius: 999px;
      backdrop-filter: blur(6px);
      cursor: pointer;
      transition: 0.3s ease;
      white-space: nowrap;
    }
    .dl-btn:hover, .chart-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(1.05);
    }
    .chart-name-btn {
      padding: 0.3rem 0.7rem;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(6px);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      font-size: 0.85rem;
      text-decoration: none;
      display: inline-block;
      transition: 0.3s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 150px;
    }
    .chart-name-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: scale(1.05);
    }
    #lightbox {
      display: flex;
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(6px);
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease;
    }
    #lightbox.active {
      opacity: 1;
      visibility: visible;
    }
    #lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
      animation: zoomIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes zoomIn {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      z-index: 9999;
    }
    .modal-content {
      background: rgba(255,255,255,0.08);
      padding: 1rem 1.5rem;
      border-radius: 12px;
      color: #fff;
      backdrop-filter: blur(12px);
      max-width: 300px;
      width: 90%;
      animation: zoomIn 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .modal-content h3 {
      margin-top: 0;
      font-size: 1.1rem;
      color: #a1e5ef;
    }
    .modal-content ul {
      list-style: none;
      padding-left: 0;
    }
    .modal-content li {
      padding: 0.2rem 0;
    }
    .highlight-host {
      font-weight: bold;
      color: #ffd700;
    }
    .state-label {
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.8rem;
    }
    .state-selecting {
      background: rgba(255, 215, 0, 0.2);
      color: #ffd700;
    }
    .state-ready {
      background: rgba(0, 255, 0, 0.2);
      color: #0f0;
    }
    .state-playing {
      background: rgba(255, 0, 0, 0.2);
      color: #f33;
    }
    @media (max-width: 768px) {
      header {
        padding: 0.5rem 1rem;
        flex-wrap: wrap;
      }
      .logo-nav-container {
        flex: 0 0 100%;
        margin-bottom: 0.5rem;
      }
      .user-section {
        flex: 0 0 100%;
        justify-content: flex-end;
      }
      .nav-links a {
        margin-right: 1rem;
      }
      .username {
        max-width: 80px;
      }
      th, td {
        padding: 0.6rem 0.8rem;
        font-size: 0.8rem;
      }
      table {
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <!-- 页面加载动画 -->
  <div id="page-loader">
    <div class="load_11">
      <div class="rect1"></div>
      <div class="rect2"></div>
      <div class="rect3"></div>
      <div class="rect4"></div>
      <div class="rect5"></div>
    </div>
  </div>
  <div class="parallax-bg"></div>
  
  <header>
    <div class="logo-nav-container">
      <img id="logo-img" src="https://phira.htadiy.cc/logo.png" alt="HyperSynapse Logo">
      <div class="nav-links">
        <a href="index.html">主页</a>
        <a href="rooms.html">房间列表</a>
        <a href="account.html" class="active">账号管理</a>
      </div>
    </div>
    
    <div class="user-section">
      <!-- 登录按钮（未登录时） -->
      <div id="login-button" class="glass-button" onclick="openAuth()">
        <a href="javascript:void(0)" class="login-btn">登录</a>
      </div>
      <!-- 用户信息（登录后） -->
      <div id="avatar-container" style="display: none;" class="glass-button">
        <div class="user-info" onclick="toggleDropdown()">
          <span class="username" id="username-display"></span>
          <img class="user-avatar" id="user-avatar" src="" alt="头像" />
        </div>
        <div class="dropdown-content" id="user-dropdown">
          <span id="dropdown-username"></span>
          <a id="phira-profile-link" target="_blank">我的Phira账户</a>
          <a href="account.html">账号管理</a>
          <a href="javascript:void(0)" onclick="logout()">退出登录</a>
        </div>
      </div>
    </div>
  </header>
  
  <main id="main-content" style="opacity:0;transition:opacity 0.6s;">
    <div id="status" class="status">服务器状态：检测中...</div>
    <div id="table-container">
      <table id="rooms-table">
        <thead>
          <tr>
            <th>房间名</th>
            <th>房主</th>
            <th>人数</th>
            <th>状态</th>
            <th>循环</th>
            <th>谱面</th>
            <th>曲绘</th>
            <th>下载</th>
            <th>人员</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="9">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <div id="lightbox" onclick="hideLightbox()">
    <img id="lightbox-img" src="" alt="曲绘" />
  </div>

  <div id="user-modal" class="modal">
    <div class="modal-content">
      <h3>房间内用户</h3>
      <ul id="user-list"></ul>
      <button class="dl-btn" onclick="closeModal()">关闭</button>
    </div>
  </div>
  
  <!-- 登录注册弹窗 -->
  <div id="auth-modal" class="modal" style="z-index: 99999">
    <div class="modal-content glass-card" id="auth-box">
      <h3 id="auth-title">用户登录</h3>
      <input id="auth-name" placeholder="用户名" />
      <input id="auth-password" type="password" placeholder="密码" />
      <input id="auth-phiraid" class="collapsed" placeholder="Phira ID (仅注册)"/>
      <input id="auth-password-confirm" type="password" placeholder="确认密码" style="display:none;" />
      <div class="checkbox-container">
        <input type="checkbox" id="remember-me">
        <label for="remember-me" style="margin-left:8px;">记住我</label>
      </div>
      <div id="agreement-container" class="checkbox-container" style="display: none;">
        <input type="checkbox" id="agree-terms" required>
        <label for="agree-terms" style="margin-left:8px;">我同意<a href="https://phira.htadiy.cc/privacy.html" target="_blank">用户协议</a></label>
      </div>
      <button onclick="submitAuth()">确认</button>
      <p id="auth-msg" style="margin-top:0.5rem;font-size:0.8rem;color:#ffccaa;"></p>
      <button onclick="toggleAuthMode()" style="margin-top:1rem">切换登录 / 注册</button>
      <button class="dl-btn" onclick="closeAuth()">关闭</button>
    </div>
  </div>

  <style>
    .checkbox-container {
      display: flex;
      align-items: center;
      margin: 0.5rem 0;
    }
    .checkbox-container input[type="checkbox"] {
      margin-right: 0.5rem;
    }
    #auth-modal input {
      box-sizing: border-box;
      display: block;
      margin: 0.5rem 0;
      padding: 0.8rem;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      backdrop-filter: blur(8px);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
    }
    #auth-modal input:focus {
      box-shadow: 0 0 0.5rem rgba(255, 255, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    #auth-modal input.collapsed {
      display: none;
      margin: 0;
      height: 0;
      padding: 0;
    }
    #auth-modal button {
      width: 100%;
      margin: 0.5rem 0;
      padding: 0.8rem;
      font-size: 1rem;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
      backdrop-filter: blur(12px);
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    #auth-modal button:hover {
      background: rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }
    .glass-card {
      position: relative;
      background: rgba(255,255,255,0.08);
      padding: 1.5rem;
      border-radius: 16px;
      color: #fff;
      backdrop-filter: blur(20px);
      width: 320px;
      max-width: 90%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
  </style>

  <script>
    // 默认头像URL
    const DEFAULT_AVATAR = 'https://phira.moe/assets/user-6212ee95.png';
    const USER_CACHE = new Map();
    const CHART_CACHE = new Map();
    const STATE_MAP = {
      'SELECTING_CHART': { text: '选谱中', class: 'state-selecting' },
      'WAITING_FOR_READY': { text: '准备中', class: 'state-ready' },
      'PLAYING': { text: '游戏中', class: 'state-playing' }
    };
    
    let currentUser = null;
    let authMode = 'login';
    let autoRefreshInterval;
    let isHoveringTable = false;
    let lastMousePosition = { x: 0, y: 0 };

    // 页面加载时检查登录状态
    document.addEventListener('DOMContentLoaded', async () => {
      // 扩大表格倾斜范围，越靠边倾斜越小，回正过程平滑
      const roomsTable = document.getElementById('rooms-table');
      if (roomsTable) {
        document.addEventListener('mousemove', (e) => {
          const winW = window.innerWidth;
          const winH = window.innerHeight;
          const centerX = winW / 2;
          const centerY = winH / 2;
          const relX = (e.clientX - centerX) / centerX;
          const relY = (e.clientY - centerY) / centerY;
          const maxAngle = 6;
          const rotateY = relX * maxAngle * (1 - Math.abs(relX) * 0.7);
          const rotateX = -relY * maxAngle * (1 - Math.abs(relY) * 0.7);
          roomsTable.style.transition = 'transform 0.5s cubic-bezier(.4,2,.3,1)';
          roomsTable.style.transform = `translateZ(20px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });
        document.addEventListener('mouseleave', () => {
          roomsTable.style.transition = 'transform 1.2s cubic-bezier(.4,2,.3,1)';
          roomsTable.style.transform = 'translateZ(20px) rotateX(0deg) rotateY(0deg)';
        });
      }

      // 检查会话状态
      try {
        const response = await fetch('/api/auth/me');
        if (response.ok) {
          currentUser = await response.json();
          updateUserDisplay();
        }
      } catch (error) {
        console.error('检查会话失败:', error);
      }

      // 检测服务器状态（ping phira.htadiy.cc）
      await checkServerStatus();

      // 加载房间数据
      await loadRooms();

      // 所有控件和数据加载完成后，淡出加载动画，主内容淡入
      setTimeout(() => {
        const loader = document.getElementById('page-loader');
        const mainContent = document.getElementById('main-content');
        if (loader) loader.classList.add('hide');
        if (mainContent) mainContent.style.opacity = 1;
      }, 600);

      // 设置每3秒自动刷新
      autoRefreshInterval = setInterval(async () => {
        await checkServerStatus();
        await loadRooms();
      }, 3000);
    });

    // 检查 /api/rooms/info 是否有返回
    async function checkServerStatus() {
      const status = document.getElementById("status");
      try {
        const res = await fetch("/api/rooms/info?_=" + Date.now(), { method: "GET", cache: "no-store" });
        if (res.ok) {
          status.textContent = "服务器状态：在线 :)  加入我们的QQ群：1049578201";
          status.classList.add("online");
          status.classList.remove("offline");
        } else {
          throw new Error("无返回");
        }
      } catch (err) {
        status.textContent = "服务器状态：离线 :(  加入我们的QQ群：1049578201";
        status.classList.add("offline");
        status.classList.remove("online");
      }
    }

    // 更新用户显示区域
    function updateUserDisplay() {
      const loginButton = document.getElementById('login-button');
      const avatarContainer = document.getElementById('avatar-container');
      
      if (currentUser) {
        // 隐藏登录按钮
        loginButton.style.display = 'none';
        
        // 显示头像容器
        avatarContainer.style.display = 'flex';
        
        // 更新用户名和头像
        document.getElementById('username-display').textContent = currentUser.username;
        document.getElementById('user-avatar').src = currentUser.phira_avatar || DEFAULT_AVATAR;
        document.getElementById('dropdown-username').textContent = currentUser.username;
        
        // 更新Phira账户链接
        const phiraLink = document.getElementById('phira-profile-link');
        if (phiraLink && currentUser.phira_id) {
          phiraLink.href = `https://phira.moe/user/${currentUser.phira_id}`;
        }
      } else {
        // 显示登录按钮
        loginButton.style.display = 'flex';
        
        // 隐藏头像容器
        avatarContainer.style.display = 'none';
      }
    }

    // 切换下拉菜单显示状态
    function toggleDropdown() {
      const dropdown = document.getElementById('user-dropdown');
      if (dropdown) {
        dropdown.classList.toggle('show');
      }
    }

    // 点击其他地方关闭下拉菜单
    document.addEventListener('click', (e) => {
      const dropdown = document.getElementById('user-dropdown');
      const userInfo = document.querySelector('.user-info');
      if (dropdown && dropdown.classList.contains('show') && 
          !e.target.closest('.user-info') && 
          !e.target.closest('.dropdown-content')) {
        dropdown.classList.remove('show');
      }
    });

    // 退出登录
    async function logout() {
      try {
        await fetch('/api/auth/logout', { method: 'POST' });
        currentUser = null;
        updateUserDisplay();
        // 关闭下拉菜单
        const dropdown = document.getElementById('user-dropdown');
        if (dropdown) dropdown.classList.remove('show');
      } catch (err) {
        console.error('登出失败:', err);
      }
    }

    // 获取用户信息
    async function getUserInfo(userId) {
      if (USER_CACHE.has(userId)) {
        return USER_CACHE.get(userId);
      }
      
      try {
        const res = await fetch(`https://phira.5wyxi.com/user/${userId}`);
        if (!res.ok) return null;
        const userData = await res.json();
        USER_CACHE.set(userId, userData);
        return userData;
      } catch (err) {
        console.error('获取用户信息错误:', err);
        return null;
      }
    }
    
    // 获取谱面信息
    async function getChartInfo(chartId) {
      if (CHART_CACHE.has(chartId)) {
        return CHART_CACHE.get(chartId);
      }
      
      try {
        const res = await fetch(`https://phira.5wyxi.com/chart/${chartId}`);
        if (!res.ok) return null;
        const chartData = await res.json();
        CHART_CACHE.set(chartId, chartData);
        return chartData;
      } catch (err) {
        console.error('获取谱面信息错误:', err);
        return null;
      }
    }
    
    // 加载房间数据
    async function loadRooms() {
      try {
        const res = await fetch('/api/rooms/info');
        if (!res.ok) throw new Error('获取房间信息失败');
        
        const rooms = await res.json();
        console.log('房间数据调试:', rooms); // 调试输出
        const tbody = document.querySelector("#rooms-table tbody");
        
        if (!Array.isArray(rooms) || rooms.length === 0) {
          tbody.innerHTML = "<tr><td colspan='9'>暂无房间 加入我们的QQ群：1049578201</td></tr>";
          return;
        }
        
        // 清除现有内容
        tbody.innerHTML = "";
        
        // 处理每个房间
        for (const room of rooms) {
          if (!room || !room.host) {
            console.warn('跳过无效房间:', room);
            continue;
          }
          // 获取房主信息
          const hostInfo = await getUserInfo(room.host);
          const hostName = hostInfo ? hostInfo.name : `用户${room.host}`;
          // 获取谱面信息（如果有）
          let chartText = "暂未选择";
          let chartImg = "暂未选择";
          let downloadBtn = "暂未选择";
          if (room.chart) {
            const chartInfo = await getChartInfo(room.chart);
            if (chartInfo) {
              chartText = chartInfo.name
                ? `<a href="https://phira.moe/chart/${room.chart}" target="_blank" class="chart-name-btn">${chartInfo.name}</a>`
                : `ID: ${room.chart}`;
              chartImg = chartInfo.illustration
                ? `<button class="chart-btn" onclick="showLightbox('${chartInfo.illustration}')">查看</button>`
                : "无封面";
              downloadBtn = chartInfo.file
                ? `<a href="${chartInfo.file}" download="chart_${room.chart}.zip"><button class="dl-btn">下载</button></a>`
                : "无文件";
            }
          }
          // 状态显示
          const stateInfo = STATE_MAP[room.state] || { text: room.state, class: '' };
          const stateDisplay = '<span class="state-label ' + stateInfo.class + '">' + stateInfo.text + '</span>';
          // 人数显示
          const playerCount = room.players ? room.players.length : 0;
          const playerDisplay = `${playerCount} / ${room.max_players}`;
          // 房间行HTML
          const rowHTML = `
            <tr>
              <td>${room.name}</td>
              <td>${hostName}</td>
              <td>${playerDisplay}</td>
              <td>${stateDisplay}</td>
              <td>${room.loop ? '是' : '否'}</td>
              <td>${chartText}</td>
              <td>${chartImg}</td>
              <td>${downloadBtn}</td>
              <td>
                <button class="dl-btn" onclick="showUsersInRoom('${room.id}', '${room.name}')">查看</button>
              </td>
            </tr>
          `;
          // 添加到表格
          tbody.insertAdjacentHTML('beforeend', rowHTML);
        }
      } catch (err) {
        console.error(err);
        const tbody = document.querySelector("#rooms-table tbody");
        tbody.innerHTML = "<tr><td colspan='9' style='color:red;'>加载房间数据失败</td></tr>";
      }
    }

    // 显示房间内用户
    async function showUsersInRoom(roomId, roomName) {
      const modal = document.getElementById("user-modal");
      const userList = document.getElementById("user-list");
      userList.innerHTML = "加载中...";
      modal.style.display = "flex";
      
      try {
        const res = await fetch(`/api/rooms/${roomId}/users`);
        if (!res.ok) throw new Error('获取房间用户失败');
        
        const users = await res.json();
        console.log('房间用户数据:', users); // 调试输出
        
        // 清空现有用户列表
        userList.innerHTML = "";
        
        if (!Array.isArray(users) || users.length === 0) {
          userList.innerHTML = "<li style='color:#f33;'>房间内暂无其他用户</li>";
          return;
        }
        
        // 获取所有用户信息
        const userInfos = await Promise.all(users.map(user => getUserInfo(user.id)));
        
        // 生成用户列表项
        userInfos.forEach(userInfo => {
          if (!userInfo) return;
          const listItem = document.createElement("li");
          listItem.textContent = userInfo.name;
          listItem.style.color = "#61E8EA";
          listItem.style.margin = "0.3rem 0";
          listItem.style.fontWeight = "bold";
          userList.appendChild(listItem);
        });
      } catch (err) {
        console.error(err);
        userList.innerHTML = "<li style='color:red;'>加载用户数据失败</li>";
      }
    }

    // 打开认证弹窗
    function openAuth() {
      authMode = 'login';
      document.getElementById('auth-title').textContent = '用户登录';
      document.getElementById('auth-password-confirm').style.display = 'none';
      document.getElementById('auth-phiraid').classList.add('collapsed');
      document.getElementById('agreement-container').style.display = 'none';
      document.getElementById('remember-me').checked = true;
      document.getElementById('auth-msg').textContent = '';
      document.getElementById('auth-modal').style.display = 'flex';
      setTimeout(() => {
        document.getElementById('auth-name').focus();
      }, 300);
    }

    // 关闭认证弹窗
    function closeAuth() {
      document.getElementById('auth-modal').style.display = 'none';
      clearAuthFields();
    }

    // 切换登录/注册模式
    function toggleAuthMode() {
      authMode = authMode === 'login' ? 'register' : 'login';
      const isLogin = authMode === 'login';
      document.getElementById('auth-title').textContent = isLogin ? '用户登录' : '用户注册';
      document.getElementById('auth-password-confirm').style.display = isLogin ? 'none' : 'block';
      document.getElementById('auth-phiraid').classList.toggle('collapsed', isLogin);
      document.getElementById('agreement-container').style.display = isLogin ? 'none' : 'flex';
      document.getElementById('auth-msg').textContent = '';
      // 清空密码字段
      document.getElementById('auth-password').value = '';
      document.getElementById('auth-password-confirm').value = '';
      setTimeout(() => {
        document.getElementById('auth-name').focus();
      }, 300);
    }

    // 清空认证字段
    function clearAuthFields() {
      document.getElementById('auth-name').value = '';
      document.getElementById('auth-password').value = '';
      document.getElementById('auth-phiraid').value = '';
      document.getElementById('auth-password-confirm').value = '';
      document.getElementById('remember-me').checked = false;
      document.getElementById('agreement-container').style.display = 'none';
      document.getElementById('auth-msg').textContent = '';
    }

    // 提交认证信息
    async function submitAuth() {
      const name = document.getElementById('auth-name').value.trim();
      const password = document.getElementById('auth-password').value.trim();
      const phiraId = document.getElementById('auth-phiraid').value.trim();
      const rememberMe = document.getElementById('remember-me').checked;
      const isLogin = authMode === 'login';
      
      // 简单验证
      if (!name || !password) {
        showAuthMessage('用户名和密码不能为空', true);
        return;
      }
      if (!isLogin && !phiraId) {
        showAuthMessage('Phira ID不能为空', true);
        return;
      }
      
      try {
        // 注册
        if (!isLogin) {
          const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, password, phiraId })
          });
          if (!res.ok) throw new Error('注册失败');
          const result = await res.json();
          showAuthMessage('注册成功！请登录', false);
          toggleAuthMode();
        } else {
          // 登录
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, password, rememberMe })
          });
          if (!res.ok) throw new Error('登录失败');
          const result = await res.json();
          currentUser = result;
          updateUserDisplay();
          closeAuth();
          showAuthMessage('登录成功', false);
        }
      } catch (err) {
        console.error(err);
        showAuthMessage(err.message, true);
      }
    }

    // 显示认证消息
    function showAuthMessage(msg, isError) {
      const msgElement = document.getElementById('auth-msg');
      msgElement.textContent = msg;
      msgElement.style.color = isError ? '#ff4444' : '#66bb6a';
      msgElement.style.display = 'block';
      setTimeout(() => {
        msgElement.style.display = 'none';
      }, 3000);
    }
  </script>
</body>
