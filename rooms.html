<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="description" content="HyperSynapse Network 提供免费、稳定、低延迟的 Phira 多人音乐游戏服务器" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="screen-orientation" content="landscape">
  <title>房间列表 - HyperSynapse Phira</title>
  <link rel="stylesheet" type="text/css" href="./css/style.css">
  <link rel="stylesheet" type="text/css" href="./css/rooms.css">
</head>
<body>
  <div class="parallax-bg"></div>
  <div id="page-loader"></div>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $('#page-loader').load('./component/page-loader.html');
  </script>
  
  <div id="header"></div>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $('#header').load('./component/header.html');
  </script>
  
  <main id="main-content" style="opacity:0;transition:opacity 0.6s;">
    <div id="status" class="status">服务器状态：检测中...</div>
    <div id="table-container">
      <table id="rooms-table">
        <thead>
          <tr>
            <th>房间名</th>
            <th>房主</th>
            <th>人数</th>
            <th>状态</th>
            <th>循环</th>
            <th>谱面</th>
            <th>曲绘</th>
            <th>下载</th>
            <th>人员</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="9">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <div id="lightbox" onclick="hideLightbox()">
    <img id="lightbox-img" src="" alt="曲绘" />
  </div>

  <div id="user-modal" class="modal">
    <div class="modal-content">
      <h3>房间内用户</h3>
      <ul id="user-list"></ul>
      <button class="dl-btn" onclick="closeModal()">关闭</button>
    </div>
  </div>

  <div id="auth"></div>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $('#auth').load('./component/auth.html');
  </script>

  <script src="js/rooms.js"></script>
</body>
</html>
