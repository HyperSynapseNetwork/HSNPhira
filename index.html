<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="description" content="HyperSynapse Network 提供免费、稳定、低延迟的 Phira 多人音乐游戏服务器" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HyperSynapse Network免费Phira多人游戏服务器</title>
    <link rel="stylesheet" href="./css/index.css" />
</head>
<body>
    <div class="parallax-bg"></div>
    <div class="toast" id="toast">操作成功！</div>

    <header>
         <img src="logo.png" alt="logo" />
         <div class="nav-links">
                   <a href="index.html">主页</a>
                   <a href="rooms.html">房间列表</a>
                   <a href="account.html">账号管理</a>
                   <a href="ranks.html">排行榜</a>
                   <a href="top.html" class="active">热门谱面</a>
         </div>
    </header>

    <section class="hero hero-content">
         <h1>HyperSynapse Network Phira多人游戏服务器</h1>
         <p class="tagline">免费 · 稳定 · 低延迟</p>
         <p class="user-count" id="user-count">加载中...</p>
    </section>

    <section class="qq-section">
         <h2>加入我们的 QQ 群（群主是猫娘🤔）</h2>
         
         <div class="info-box">
              <div class="info-item">
                   <span class="info-label">QQ群号</span>
                   <span class="info-value">1049578201</span>
              </div>
              <div class="info-item">
                   <span class="info-label">服务器地址</span>
                   <span class="info-value">service.htadiy.cc:7865</span>
              </div>
         </div>
         
         <div class="buttons">
              <button class="primary" onclick="copyQQ()">
                   <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M8 0C3.588 0 0 3.588 0 8s3.588 8 8 8 8-3.588 8-8-3.588-8-8-8zm.5 12h-1v-1h1v1zm0-2h-1V5h1v5z"/>
                   </svg>
                   复制QQ群号
              </button>
              <button onclick="copyServerAddress()">
                   <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/>
                        <path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3z"/>
                   </svg>
                   复制服务器地址
              </button>
         </div>
    </section>

    <script>
         // 复制QQ群号功能
         function copyQQ() {
              // 使用现代Clipboard API [6,7](@ref)
              if (navigator.clipboard && navigator.clipboard.writeText) {
                   navigator.clipboard.writeText('1049578201')
                        .then(() => showToast('QQ群号已复制！'))
                        .catch(() => {
                             // 如果现代API失败，回退到传统方法 [1,4](@ref)
                             fallbackCopyText('1049578201', 'QQ群号');
                        });
              } else {
                   // 使用传统的execCommand方法作为备选方案 [1,2](@ref)
                   fallbackCopyText('1049578201', 'QQ群号');
              }
         }

         // 复制服务器地址功能
         function copyServerAddress() {
              if (navigator.clipboard && navigator.clipboard.writeText) {
                   navigator.clipboard.writeText('service.htadiy.cc:7865')
                        .then(() => showToast('服务器地址已复制！'))
                        .catch(() => {
                             fallbackCopyText('service.htadiy.cc:7865', '服务器地址');
                        });
              } else {
                   fallbackCopyText('service.htadiy.cc:7865', '服务器地址');
              }
         }

         // 传统复制方法作为备选 [1,4,6](@ref)
         function fallbackCopyText(text, type) {
              // 创建临时的textarea元素 [4,7](@ref)
              const textArea = document.createElement('textarea');
              textArea.value = text;
              textArea.style.position = 'fixed';
              textArea.style.top = '0';
              textArea.style.left = '0';
              textArea.style.opacity = '0';
              
              document.body.appendChild(textArea);
              textArea.focus();
              textArea.select();
              
              try {
                   // 执行复制命令 [1,6](@ref)
                   const successful = document.execCommand('copy');
                   document.body.removeChild(textArea);
                   if (successful) {
                        showToast(`${type}已复制！`);
                   } else {
                        showToast(`复制失败，请手动选择并复制`);
                   }
              } catch (err) {
                   document.body.removeChild(textArea);
                   showToast(`复制失败，请手动选择并复制`);
              }
         }

         // 显示操作提示
         function showToast(message) {
              const toast = document.getElementById('toast');
              toast.textContent = message;
              toast.classList.add('show');
              
              setTimeout(() => {
                   toast.classList.remove('show');
              }, 3000);
         }

         // 页面滚动动画
         const observer = new IntersectionObserver((entries) => {
              entries.forEach(entry => {
                   if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                   }
              });
         }, { threshold: 0.3 });

         document.querySelectorAll('section').forEach(section => {
              observer.observe(section);
         });

         // 获取用户数量
         fetch("/api/auth/visited/count")
              .then(res => res.json())
              .then(data => {
                   const count = data;
                   document.getElementById("user-count").innerText = `已有 ${count} 位用户使用过我们的服务器`;
              })
              .catch(() => {
                   document.getElementById("user-count").innerText = "无法加载用户数据";
              });
    </script>
</body>
</html>
