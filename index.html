<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HSNPhira — Demo</title>
  <link rel="stylesheet" href="src/css/styles.css" />
</head>
<body>
  <div id="app" class="app-root">
    <header class="header">
      <h1>HSNPhira Demo</h1>
    </header>

    <main class="page page-home">
      <section class="home-left">
        <h2>HyperSynapse Network Phira多人游戏服务器</h2>
        <p class="subtitle">免费 · 多功能 · 稳定 · 低延迟</p>
        <div id="visited-count" class="glass-card">已访问: --</div>
      </section>

      <section class="home-right">
        <div class="glass-card server-status">
          <h3>服务器状态</h3>
            <div id="server-status">加载中...</div>
            <div class="server-contact" style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
              <div class="glass-card small" style="padding:8px;display:flex;align-items:center;gap:8px">
                <div>QQ群: <strong id="server-qq">1049578201</strong></div>
                <button class="btn-rect" id="copy-qq">复制</button>
              </div>
              <div class="glass-card small" style="padding:8px;display:flex;align-items:center;gap:8px">
                <div>地址: <strong id="server-address">service.htadiy.com:7865</strong></div>
                <button class="btn-rect" id="copy-address">复制</button>
              </div>
            </div>
        </div>
      </section>

      <section class="room-list">
        <h3>房间列表</h3>
        <div class="server-status-inline">状态查询组件占位</div>
        <table class="table glass3d" id="rooms-table">
          <thead>
            <tr>
              <th>房间名</th>
              <th>房主</th>
              <th>人数</th>
              <th>状态</th>
              <th>循环</th>
              <th>锁定</th>
              <th>谱面</th>
              <th>曲绘</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <!-- 由 JS 渲染 -->
          </tbody>
        </table>
      </section>
    </main>

    <!-- 其他页面占位 -->
    <main class="page page-charts" data-page="charts" style="display:none">
      <section>
        <h3>谱面排行</h3>
        <div id="charts-table">加载中...</div>
      </section>
    </main>

    <main class="page page-users" data-page="users" style="display:none">
      <section>
        <h3>用户排行</h3>
        <div id="users-table">加载中...</div>
      </section>
    </main>

    <main class="page page-account" data-page="account" style="display:none">
      <section>
        <h3>账户管理</h3>
        <div id="account-panel">加载中...</div>
      </section>
    </main>

    <main class="page page-tools" data-page="tools" style="display:none">
      <section>
        <h3>谱面下载工具</h3>
        <div class="glass-card">
          <input id="tool-chart-id" placeholder="输入谱面ID并按确定" />
          <button id="tool-open-chart" class="btn-rect">打开谱面</button>
        </div>
      </section>
    </main>

    <div id="window-host"></div>

    <div id="toast-root"></div>

  </div>

  <script src="src/js/core/event-bus.js"></script>
  <script src="src/js/core/auth.js"></script>
  <script src="src/js/core/sse-client.js"></script>
  <script src="src/js/ui/header.js"></script>
  <script src="src/js/ui/footer.js"></script>
  <script src="src/js/ui/server-status.js"></script>
  <script src="src/js/window/window-base.js"></script>
  <script src="src/js/window/window-link.js"></script>
  <script src="src/js/window/window-auth.js"></script>
  <script src="src/js/window/window-chart.js"></script>
  <script src="src/js/window/window-setting.js"></script>
  <script src="src/js/ui/loader.js"></script>
  <script src="src/js/core/page-loader.js"></script>
    <script src="src/js/pages/charts-page.js"></script>
    <script src="src/js/pages/users-page.js"></script>
  <script src="src/js/ui/message-toast.js"></script>
  <script>
    // 初始化
    document.addEventListener('DOMContentLoaded', async () => {
      await corePageLoader.init();
    });
  </script>
</body>
</html>
