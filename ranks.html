<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="description" content="HyperSynapse Network 提供免费、稳定、低延迟的 Phira 多人音乐游戏服务器" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="screen-orientation" content="landscape">
    <title>游玩时间排行榜 - HyperSynapse Phira</title>
    <link rel="stylesheet" type="text/css" href="./css/style.css">
    <link rel="stylesheet" type="text/css" href="./css/ranks.css">
</head>
<body>
  
     <div id="header"></div>
     <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
     <script>
       $('#header').load('./component/header.html');
     </script>
    
     <main id="main-content" style="opacity:0;transition:opacity 0.6s;">
         <div id="status" class="status">服务器状态：检测中...</div>
         <div id="total-playtime" class="status">总游玩时间：加载中...</div>
         
         <!-- 搜索框 -->
         <div class="search-container">
              <div class="search-box">
                   <span class="search-icon"> </span>
                   <input type="text" id="search-input" placeholder="搜索用户ID或用户名..." />
              </div>
              <div class="search-hint">支持ID精确搜索和用户名模糊搜索</div>
         </div>
         
         <div id="table-container">
              <table id="leaderboard-table">
                   <thead>
                        <tr>
                             <th>名次</th>
                             <th>用户名</th>
                             <th>游玩时间</th>
                        </tr>
                   </thead>
                   <tbody>
                        <tr><td colspan="3">加载中...</td></tr>
                   </tbody>
              </table>
         </div>
         <div class="pagination">
              <button id="prev-page" disabled>上一页</button>
              <span id="page-info">第 1 页</span>
              <button id="next-page" disabled>下一页</button>
         </div>
    </main>

    <div id="lightbox" onclick="hideLightbox()">
         <img id="lightbox-img" src="" alt="曲绘" />
    </div>

    <div id="user-modal" class="modal">
         <div class="modal-content">
              <h3>房间内用户</h3>
              <ul id="user-list"></ul>
              <button class="dl-btn" onclick="closeModal()">关闭</button>
         </div>
    </div>
    
    <div id="auth"></div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
      $('#auth').load('./component/auth.html');
    </script>

    <script src="js/ranks.js"></script>
</body>
</html>
