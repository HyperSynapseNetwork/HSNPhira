<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="description" content="HyperSynapse Network 提供免费、稳定、低延迟的 Phira 多人音乐游戏服务器" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="screen-orientation" content="landscape">
  <title>热门谱面 - HyperSynapse Phira</title>
  <style>
    /* 简化页面加载动画 */
    #page-loader {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.95);
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s;
      opacity: 1;
      pointer-events: auto;
    }
    #page-loader.hide {
      opacity: 0;
      pointer-events: none;
    }
    .load-simple {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(97, 232, 234, 0.3);
      border-top: 5px solid #61E8EA;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* 简化文字悬停效果 */
    th:hover, td:hover, .status:hover, .chart-name-btn:hover {
      color: #61E8EA !important;
      transition: color 0.2s;
      text-decoration: none;
    }

    /* 简化卡片悬停效果 */
    table:hover {
      background: rgba(255,255,255,0.08);
      transition: background 0.3s ease;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #000;
      color: #eee;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }
    .parallax-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image: url('https://webstatic.cn-nb1.rains3.com/5712%C3%973360.jpeg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }
    header {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 1.5rem;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      box-sizing: border-box;
    }
    .logo-nav-container {
      display: flex;
      align-items: center;
      flex: 1;
    }
    #logo-img {
      height: 32px;
      margin-right: 1.2rem;
    }
    .nav-links {
      display: flex;
    }
    .nav-links a {
      color: #eee;
      margin-right: 1.2rem;
      text-decoration: none;
      transition: 0.3s;
      font-size: 0.95rem;
    }
    .nav-links a:hover {
      color: #61E8EA;
    }
    .user-section {
      display: flex;
      justify-content: flex-end;
      flex: 1;
    }
    .glass-button {
      display: flex;
      align-items: center;
      padding: 0.4rem 1rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 100px;
    }
    .glass-button:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    .login-btn {
      color: #eee;
      text-decoration: none;
      font-size: 0.95rem;
      white-space: nowrap;
      width: 100%;
      text-align: center;
    }
    .user-info {
      display: flex;
      align-items: center;
      position: relative;
      cursor: pointer;
      width: 100%;
    }
    .username {
      margin-right: 0.8rem;
      font-size: 0.95rem;
      color: #eee;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .user-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .dropdown-content {
      position: absolute;
      top: 100%;
      right: 0;
      background: rgba(0, 0, 0, 0.8);
      border-radius: 8px;
      padding: 0.8rem;
      min-width: 160px;
      z-index: 1001;
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px);
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .dropdown-content.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .dropdown-content span {
      display: block;
      padding: 0.3rem 0.5rem;
      font-weight: bold;
      color: #a1e5ef;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 0.5rem;
    }
    .dropdown-content a {
      display: block;
      padding: 0.5rem;
      color: #eee;
      text-decoration: none;
      border-radius: 4px;
      transition: all 0.3s ease;
    }
    .dropdown-content a:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }
    main {
      position: relative;
      z-index: 2;
      padding-top: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .status {
      margin-bottom: 1rem;
      font-size: 1.2rem;
      text-align: center;
      padding: 0.5rem;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      width: 95%;
      max-width: 800px;
    }
    .status.online { 
      color: #0f0; 
      border: 1px solid rgba(0, 255, 0, 0.2);
    }
    .status.offline { 
      color: #f33; 
      border: 1px solid rgba(255, 0, 0, 0.2);
    }
    .status.cached {
      color: #ffcc00;
      border: 1px solid rgba(255, 204, 0, 0.2);
    }
    
    /* 简化表格样式 */
    #table-container {
      width: 95%;
      max-width: 1200px;
      margin: 0 auto;
    }

    table {
      border-collapse: collapse;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      overflow: hidden;
      width: 100%;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    th, td {
      padding: 0.8rem 1rem;
      text-align: left;
      font-size: 0.9rem;
    }
    th {
      background: rgba(255, 255, 255, 0.1);
      font-weight: bold;
      color: #a1e5ef;
    }
    tr:nth-child(even) {
      background: rgba(255, 255, 255, 0.03);
    }
    .dl-btn, .chart-btn, .copy-btn {
      padding: 0.3rem 0.8rem;
      font-size: 0.85rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
      transition: 0.3s ease;
      white-space: nowrap;
    }
    .dl-btn:hover, .chart-btn:hover, .copy-btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    .chart-name-btn {
      padding: 0.3rem 0.7rem;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      font-size: 0.85rem;
      text-decoration: none;
      display: inline-block;
      transition: 0.3s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 150px;
    }
    .chart-name-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    #lightbox {
      display: flex;
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.6);
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease;
    }
    #lightbox.active {
      opacity: 1;
      visibility: visible;
    }
    #lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
      animation: zoomIn 0.3s ease;
    }
    @keyframes zoomIn {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
    }
    .modal-content {
      background: rgba(255,255,255,0.08);
      padding: 1rem 1.5rem;
      border-radius: 8px;
      color: #fff;
      max-width: 300px;
      width: 90%;
      animation: zoomIn 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .modal-content h3 {
      margin-top: 0;
      font-size: 1.1rem;
      color: #a1e5ef;
    }
    
    /* 时间范围选择器样式 */
    .time-range-selector {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
      gap: 0.8rem;
      width: 95%;
      max-width: 800px;
    }
    .time-range-btn {
      padding: 0.6rem 1.2rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      color: #eee;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .time-range-btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    .time-range-btn.active {
      background: rgba(97, 232, 234, 0.2);
      border-color: #61E8EA;
      color: #61E8EA;
    }
    
    /* 分页控件样式 */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 1.5rem;
      gap: 0.8rem;
    }
    .pagination-btn {
      padding: 0.5rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      color: #eee;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 36px;
      text-align: center;
    }
    .pagination-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.15);
    }
    .pagination-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .pagination-btn.active {
      background: rgba(97, 232, 234, 0.2);
      border-color: #61E8EA;
      color: #61E8EA;
    }
    .pagination-info {
      font-size: 0.9rem;
      color: #aaa;
      margin: 0 0.5rem;
    }
    
    /* 缓存数据提示 */
    .cache-info {
      font-size: 0.85rem;
      color: #ffcc00;
      text-align: center;
      margin-top: 0.5rem;
      padding: 0.3rem;
      border-radius: 4px;
      background: rgba(255, 204, 0, 0.1);
    }
    
    /* 复制成功提示 */
    .copy-notification {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(97, 232, 234, 0.2);
      color: #61E8EA;
      padding: 0.8rem 1.5rem;
      border-radius: 4px;
      z-index: 10000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease;
    }
    .copy-notification.show {
      opacity: 1;
      visibility: visible;
    }
    
    @media (max-width: 768px) {
      header {
        padding: 0.5rem 1rem;
        flex-wrap: wrap;
      }
      .logo-nav-container {
        flex: 0 0 100%;
        margin-bottom: 0.5rem;
      }
      .user-section {
        flex: 0 0 100%;
        justify-content: flex-end;
      }
      .nav-links a {
        margin-right: 1rem;
        font-size: 0.85rem;
      }
      .username {
        max-width: 80px;
      }
      th, td {
        padding: 0.6rem 0.8rem;
        font-size: 0.8rem;
      }
      table {
        display: block;
        overflow-x: auto;
      }
      .time-range-selector {
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .time-range-btn {
        padding: 0.5rem 0.8rem;
        font-size: 0.8rem;
      }
      .chart-name-btn {
        max-width: 100px;
      }
    }
  </style>
</head>
<body>
  <!-- 简化的页面加载动画 -->
  <div id="page-loader">
    <div class="load-simple"></div>
  </div>
  <div class="parallax-bg"></div>
  
  <header>
    <div class="logo-nav-container">
      <img id="logo-img" src="https://phira.htadiy.cc/logo.png" alt="HyperSynapse Logo">
      <div class="nav-links">
        <a href="index.html">主页</a>
        <a href="rooms.html">房间列表</a>
        <a href="account.html">账号管理</a>
        <a href="ranks.html">排行榜</a>
        <a href="top.html" class="active">热门谱面</a>
      </div>
    </div>
    
    <div class="user-section">
      <!-- 登录按钮（未登录时） -->
      <div id="login-button" class="glass-button" onclick="openAuth()">
        <a href="javascript:void(0)" class="login-btn">登录</a>
      </div>
      <!-- 用户信息（登录后） -->
      <div id="avatar-container" style="display: none;" class="glass-button">
        <div class="user-info" onclick="toggleDropdown()">
          <span class="username" id="username-display"></span>
          <img class="user-avatar" id="user-avatar" src="" alt="头像" />
        </div>
        <div class="dropdown-content" id="user-dropdown">
          <span id="dropdown-username"></span>
          <a id="phira-profile-link" target="_blank">我的Phira账户</a>
          <a href="account.html">账号管理</a>
          <a href="javascript:void(0)" onclick="logout()">退出登录</a>
        </div>
      </div>
    </div>
  </header>
  
  <main id="main-content" style="opacity:0;transition:opacity 0.6s;">
    <div id="status" class="status">服务器状态：检测中...</div>
    
    <!-- 时间范围选择器 -->
    <div class="time-range-selector">
      <button class="time-range-btn active" data-range="hour">小时榜</button>
      <button class="time-range-btn" data-range="day">日榜</button>
      <button class="time-range-btn" data-range="week">周榜</button>
      <button class="time-range-btn" data-range="month">月榜</button>
    </div>
    
    <div id="table-container">
      <table id="charts-table">
        <thead>
          <tr>
            <th>名次</th>
            <th>谱面名称</th>
            <th>谱面ID</th>
            <th>游玩人数</th>
            <th>曲绘</th>
            <th>下载</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="6">加载中...</td></tr>
        </tbody>
      </table>
    </div>
    
    <!-- 分页控件 -->
    <div class="pagination">
      <button class="pagination-btn" id="prev-page" disabled>上一页</button>
      <span class="pagination-info" id="page-info">第 1 页</span>
      <button class="pagination-btn" id="next-page" disabled>下一页</button>
    </div>
    
    <!-- 缓存数据提示 -->
    <div id="cache-info" class="cache-info" style="display: none;"></div>
  </main>

  <!-- 复制成功提示 -->
  <div id="copy-notification" class="copy-notification">谱面ID已复制到剪贴板！</div>

  <div id="lightbox" onclick="hideLightbox()">
    <img id="lightbox-img" src="" alt="曲绘" />
  </div>
  
  <!-- 登录注册弹窗 -->
  <div id="auth-modal" class="modal" style="z-index: 99999">
    <div class="modal-content" id="auth-box">
      <h3 id="auth-title">用户登录</h3>
      <input id="auth-name" placeholder="用户名" />
      <input id="auth-password" type="password" placeholder="密码" />
      <input id="auth-phiraid" class="collapsed" placeholder="Phira ID (仅注册)"/>
      
      <!-- 记住我复选框 -->
      <div class="checkbox-container">
        <div class="glass-checkbox">
          <input type="checkbox" id="remember-me">
        </div>
        <label for="remember-me" style="margin-left:8px;">记住我</label>
      </div>
      
      <!-- 用户协议复选框（仅注册时显示） -->
      <div id="agreement-container" class="checkbox-container" style="display: none;">
        <div class="glass-checkbox">
          <input type="checkbox" id="agree-terms" required>
        </div>
        <label for="agree-terms" style="margin-left:8px;">我同意<a href="https://phira.htadiy.cc/privacy.html" target="_blank">用户协议</a></label>
      </div>
      
      <button onclick="submitAuth()">确认</button>
      <p id="auth-msg" style="margin-top:0.5rem;font-size:0.8rem;color:#ffccaa;"></p>
      <button onclick="toggleAuthMode()" style="margin-top:1rem">切换登录 / 注册</button>
      <button class="dl-btn" onclick="closeAuth()">关闭</button>
    </div>
  </div>

  <script>
    // 默认头像URL
    const DEFAULT_AVATAR = 'https://phira.moe/assets/user-6212ee95.png';
    const CHART_CACHE = new Map();
    const API_BASE_URL = 'https://phira.htadiy.cc/topchart/hot_rank';
    
    // 排行榜数据缓存
    let chartDataCache = {
      hour: null,
      day: null,
      week: null,
      month: null
    };
    
    let currentUser = null;
    let authMode = 'login';
    let autoRefreshInterval;
    
    // 热门谱面相关状态
    let currentTimeRange = 'hour';
    let currentPage = 1;
    let perPage = 20;
    let totalResults = 0;
    let lastChartListUpdate = null;
    let lastRecordUpdate = null;
    let usingCachedData = false;

    // 页面加载时检查登录状态并初始化
    document.addEventListener('DOMContentLoaded', async () => {
      // 尝试获取当前会话
      try {
        const response = await fetch('/api/auth/me');
        if (response.ok) {
          currentUser = await response.json();
          updateUserDisplay();
        }
      } catch (error) {
        console.error('检查会话失败:', error);
      }

      // 首次检查服务器状态并加载热门谱面数据
      await checkServerStatus();
      await loadHotCharts();

      // 等待资源完全准备好后再隐藏加载器
      await waitForAppReady();

      // 设置每30秒自动刷新
      autoRefreshInterval = setInterval(async () => {
        await checkServerStatus();
        await loadHotCharts();
      }, 30000);

      // 添加时间范围按钮事件监听
      document.querySelectorAll('.time-range-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const range = btn.dataset.range;
          if (range !== currentTimeRange) {
            // 更新活动按钮
            document.querySelectorAll('.time-range-btn').forEach(b => {
              b.classList.remove('active');
            });
            btn.classList.add('active');
            
            // 更新当前时间范围并重新加载数据
            currentTimeRange = range;
            currentPage = 1;
            loadHotCharts();
          }
        });
      });
      
      // 添加分页按钮事件监听
      document.getElementById('prev-page').addEventListener('click', () => {
        if (currentPage > 1) {
          currentPage--;
          loadHotCharts();
        }
      });
      
      document.getElementById('next-page').addEventListener('click', () => {
        const totalPages = Math.ceil(totalResults / perPage);
        if (currentPage < totalPages) {
          currentPage++;
          loadHotCharts();
        }
      });
    });

    // 检查服务器状态
    async function checkServerStatus() {
      const status = document.getElementById("status");
      try {
        const res = await fetch("/api/rooms/info?_=" + Date.now(), { method: "GET", cache: "no-store" });
        if (res.ok) {
          status.textContent = "服务器状态：在线 :)  加入我们的QQ群：1049578201";
          status.classList.add("online");
          status.classList.remove("offline");
          status.classList.remove("cached");
        } else {
          throw new Error("无返回");
        }
      } catch (err) {
        status.textContent = "服务器状态：离线 :(  加入我们的QQ群：1049578201";
        status.classList.add("offline");
        status.classList.remove("online");
        status.classList.remove("cached");
      }
    }

    // 更新用户显示区域
    function updateUserDisplay() {
      const loginButton = document.getElementById('login-button');
      const avatarContainer = document.getElementById('avatar-container');
      
      if (currentUser) {
        // 隐藏登录按钮
        loginButton.style.display = 'none';
        
        // 显示头像容器
        avatarContainer.style.display = 'flex';
        
        // 更新用户名和头像
        document.getElementById('username-display').textContent = currentUser.username;
        document.getElementById('user-avatar').src = currentUser.phira_avatar || DEFAULT_AVATAR;
        document.getElementById('dropdown-username').textContent = currentUser.username;
        
        // 更新Phira账户链接
        const phiraLink = document.getElementById('phira-profile-link');
        if (phiraLink && currentUser.phira_id) {
          phiraLink.href = `https://phira.moe/user/${currentUser.phira_id}`;
        }
      } else {
        // 显示登录按钮
        loginButton.style.display = 'flex';
        
        // 隐藏头像容器
        avatarContainer.style.display = 'none';
      }
    }

    // 切换下拉菜单显示状态
    function toggleDropdown() {
      const dropdown = document.getElementById('user-dropdown');
      if (dropdown) {
        dropdown.classList.toggle('show');
      }
    }

    // 点击其他地方关闭下拉菜单
    document.addEventListener('click', (e) => {
      const dropdown = document.getElementById('user-dropdown');
      const userInfo = document.querySelector('.user-info');
      if (dropdown && dropdown.classList.contains('show') && 
          !e.target.closest('.user-info') && 
          !e.target.closest('.dropdown-content')) {
        dropdown.classList.remove('show');
      }
    });

    // 退出登录
    async function logout() {
      try {
        await fetch('/api/auth/logout', { method: 'POST' });
        currentUser = null;
        updateUserDisplay();
        // 关闭下拉菜单
        const dropdown = document.getElementById('user-dropdown');
        if (dropdown) dropdown.classList.remove('show');
      } catch (err) {
        console.error('登出失败:', err);
      }
    }
    
    // 获取谱面信息
    async function getChartInfo(chartId) {
      if (CHART_CACHE.has(chartId)) {
        return CHART_CACHE.get(chartId);
      }
      
      try {
        const res = await fetch(`https://phira.5wyxi.com/chart/${chartId}`);
        if (!res.ok) return null;
        const chartData = await res.json();
        CHART_CACHE.set(chartId, chartData);
        return chartData;
      } catch (err) {
        console.error('获取谱面信息错误:', err);
        return null;
      }
    }
    
    // 加载热门谱面数据
    async function loadHotCharts() {
      try {
        const url = `${API_BASE_URL}/${currentTimeRange}?page=${currentPage}&per_page=${perPage}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('获取热门谱面失败');
        const data = await res.json();
        
        // 检查API返回的数据是否为空
        if (data.results && data.results.length > 0) {
          // 数据有效，更新全局状态
          lastChartListUpdate = data.last_chart_list_update;
          lastRecordUpdate = data.last_record_update;
          totalResults = data.total_results;
          currentPage = data.page;
          perPage = data.per_page;
          
          // 更新缓存
          chartDataCache[currentTimeRange] = {
            data: data,
            timestamp: new Date().toISOString()
          };
          
          // 更新状态显示
          const status = document.getElementById("status");
          const updateTime = new Date(lastRecordUpdate).toLocaleTimeString();
          status.textContent = `服务器状态：在线 :)  数据更新时间：${updateTime}  加入我们的QQ群：1049578201`;
          status.classList.add("online");
          status.classList.remove("offline");
          status.classList.remove("cached");
          
          // 隐藏缓存提示
          document.getElementById('cache-info').style.display = 'none';
          usingCachedData = false;
          
          // 渲染表格
          renderChartsTable(data.results);
        } else {
          // API返回了空数据，尝试使用缓存数据
          useCachedData();
        }
      } catch (err) {
        console.error('加载热门谱面错误:', err);
        // 尝试使用缓存数据
        useCachedData();
      }
    }
    
    // 使用缓存数据
    function useCachedData() {
      if (chartDataCache[currentTimeRange] && chartDataCache[currentTimeRange].data) {
        const cachedData = chartDataCache[currentTimeRange].data;
        const cacheTime = new Date(chartDataCache[currentTimeRange].timestamp).toLocaleTimeString();
        
        // 更新状态显示为缓存数据
        const status = document.getElementById("status");
        status.textContent = "服务器状态：离线，使用缓存数据";
        status.classList.add("cached");
        status.classList.remove("online");
        status.classList.remove("offline");
        
        // 显示缓存提示
        const cacheInfo = document.getElementById('cache-info');
        cacheInfo.textContent = `缓存时间：${cacheTime}（数据可能不是最新的）`;
        cacheInfo.style.display = 'block';
        
        // 渲染缓存数据
        renderChartsTable(cachedData.results);
        usingCachedData = true;
      } else {
        // 没有缓存数据时显示错误
        const status = document.getElementById("status");
        status.textContent = "服务器状态：离线 :(  加入我们的QQ群：1049578201";
        status.classList.add("offline");
        status.classList.remove("online");
        status.classList.remove("cached");
        
        const tbody = document.querySelector("#charts-table tbody");
        tbody.innerHTML = "<tr><td colspan='6'>加载失败，请稍后重试</td></tr>";
      }
    }
    
    // 渲染谱面表格
    async function renderChartsTable(results) {
      const tbody = document.querySelector("#charts-table tbody");
      if (!Array.isArray(results) || results.length === 0) {
        tbody.innerHTML = "<tr><td colspan='6'>暂时无数据</td></tr>";
        return;
      }

      // 清除现有内容
      tbody.innerHTML = "";

      // 处理每个谱面
      for (let i = 0; i < results.length; i++) {
        const chart = results[i];
        const rank = (currentPage - 1) * perPage + i + 1;
        
        // 获取谱面信息
        const chartInfo = await getChartInfo(chart.chart_id);
        
        // 构建表格行
        const tr = document.createElement("tr");
        
        // 名次列
        const rankTd = document.createElement("td");
        rankTd.textContent = rank;
        tr.appendChild(rankTd);
        
        // 谱面名称列
        const nameTd = document.createElement("td");
        if (chartInfo && chartInfo.name) {
          const nameBtn = document.createElement("a");
          nameBtn.href = `https://phira.moe/chart/${chart.chart_id}`;
          nameBtn.target = "_blank";
          nameBtn.className = "chart-name-btn";
          nameBtn.textContent = chartInfo.name;
          nameTd.appendChild(nameBtn);
        } else {
          nameTd.textContent = `ID: ${chart.chart_id}`;
        }
        tr.appendChild(nameTd);
        
        // 谱面ID列
        const idTd = document.createElement("td");
        const idSpan = document.createElement("span");
        idSpan.textContent = chart.chart_id;
        idSpan.style.marginRight = "0.5rem";
        idSpan.style.fontFamily = "monospace";
        idSpan.style.fontWeight = "bold";
        idSpan.style.color = "#61E8EA";
        
        const copyBtn = document.createElement("button");
        copyBtn.className = "copy-btn";
        copyBtn.textContent = "复制";
        copyBtn.onclick = () => copyChartId(chart.chart_id);
        
        idTd.appendChild(idSpan);
        idTd.appendChild(copyBtn);
        tr.appendChild(idTd);
        
        // 游玩人数列
        const playersTd = document.createElement("td");
        playersTd.textContent = chart.increase;
        tr.appendChild(playersTd);
        
        // 曲绘列 - 修复变量名错误
        const coverTd = document.createElement("td");
        if (chartInfo && chartInfo.illustration) {
          const coverBtn = document.createElement("button"); // 修复变量名
          coverBtn.className = "chart-btn";
          coverBtn.textContent = "查看";
          coverBtn.onclick = () => showLightbox(chartInfo.illustration);
          coverTd.appendChild(coverBtn);
        } else {
          coverTd.textContent = "无封面";
        }
        tr.appendChild(coverTd);
        
        // 下载列
        const downloadTd = document.createElement("td");
        if (chartInfo && chartInfo.file) {
          const downloadLink = document.createElement("a");
          downloadLink.href = chartInfo.file;
          downloadLink.download = `chart_${chart.chart_id}.zip`;
          const downloadBtn = document.createElement("button");
          downloadBtn.className = "dl-btn";
          downloadBtn.textContent = "下载";
          downloadLink.appendChild(downloadBtn);
          downloadTd.appendChild(downloadLink);
        } else {
          downloadTd.textContent = "无文件";
        }
        tr.appendChild(downloadTd);
        
        tbody.appendChild(tr);
      }

      // 更新分页控件
      updatePaginationControls();
    }
    
    // 复制谱面ID
    function copyChartId(chartId) {
      navigator.clipboard.writeText(chartId)
        .then(() => {
          // 显示复制成功提示
          const notification = document.getElementById('copy-notification');
          notification.classList.add('show');
          setTimeout(() => {
            notification.classList.remove('show');
          }, 2000);
        })
        .catch(err => {
          console.error('复制失败:', err);
          alert('复制失败，请手动复制谱面ID');
        });
    }
    
    // 更新分页控件状态
    function updatePaginationControls() {
      const prevBtn = document.getElementById('prev-page');
      const nextBtn = document.getElementById('next-page');
      const pageInfo = document.getElementById('page-info');
      
      const totalPages = Math.ceil(totalResults / perPage);
      
      // 更新页面信息
      pageInfo.textContent = `第 ${currentPage} 页 / 共 ${totalPages} 页`;
      
      // 更新按钮状态
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= totalPages;
    }

    // 等待页面资源加载完成的通用函数
    async function waitForAppReady() {
      // 等待表格加载完成
      const maxWait = 3000; // 最长等待时间
      const start = Date.now();
      const tbody = document.querySelector('#charts-table tbody');
      while (Date.now() - start < maxWait) {
        if (tbody && tbody.innerHTML && !tbody.innerHTML.includes('加载中') && !tbody.innerHTML.includes('加')) break;
        await new Promise(r => setTimeout(r, 80));
      }

      // 隐藏加载器并显示主内容
      const loader = document.getElementById('page-loader');
      const mainContent = document.getElementById('main-content');
      if (mainContent) {
        mainContent.style.opacity = 1;
      }
      if (loader) {
        setTimeout(() => loader.classList.add('hide'), 120);
      }
    }
    
    function showLightbox(src) {
      const lb = document.getElementById("lightbox");
      document.getElementById("lightbox-img").src = src;
      lb.style.display = "flex";
      requestAnimationFrame(() => lb.classList.add("active"));
    }
    
    function hideLightbox() {
      const lb = document.getElementById("lightbox");
      lb.classList.remove("active");
      setTimeout(() => {
        lb.style.display = "none";
        document.getElementById("lightbox-img").src = "";
      }, 300);
    }
    
    function openAuth() {
      document.getElementById('auth-modal').style.display = 'flex';
      document.getElementById('auth-msg').textContent = '';
      updateAuthUI();
    }
    
    function closeAuth() {
      document.getElementById('auth-modal').style.display = 'none';
    }
    
    function toggleAuthMode() {
      authMode = authMode === 'login' ? 'register' : 'login';
      updateAuthUI();
      
      // 显示/隐藏用户协议复选框
      const agreementContainer = document.getElementById('agreement-container');
      agreementContainer.style.display = authMode === 'register' ? 'block' : 'none';
    }
    
    function updateAuthUI() {
      var title = document.getElementById('auth-title');
      var phiraid = document.getElementById('auth-phiraid');
      if (authMode === 'login') {
        title.textContent = '用户登录';
        phiraid.classList.add('collapsed');
      }
      else {
        title.textContent = '用户注册';
        phiraid.classList.remove('collapsed');
      }
    }
    
    async function submitAuth() {
      const username = document.getElementById('auth-name').value;
      const password = document.getElementById('auth-password').value;
      const phira_id = document.getElementById('auth-phiraid').value;
      const remember = document.getElementById('remember-me').checked;
      const agreeTerms = authMode === 'register' ? document.getElementById('agree-terms').checked : true;
      const msg = document.getElementById('auth-msg');
      msg.textContent = '处理中...';
    
      try {
        // 注册时需要确认用户协议
        if (authMode === 'register' && !agreeTerms) {
          msg.textContent = '请同意用户协议';
          return;
        }
        
        const endpoint = authMode === 'login' 
          ? '/api/auth/login'
          : '/api/auth/users';
          
        const payload = authMode === 'login'
          ? { username, password, remember: remember }
          : { username, password, phira_id };
        
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });
        
        if (!res.ok) {
          const errorData = await res.json();
          msg.textContent = errorData.message || '操作失败';
          return;
        }
        
        // 登录成功后获取用户信息
        if (authMode === 'login') {
          const userRes = await fetch('/api/auth/me');
          if (!userRes.ok) {
            msg.textContent = '获取用户信息失败';
            return;
          }
          currentUser = await userRes.json();
          updateUserDisplay();
        }
        
        msg.textContent = authMode === 'login' ? '登录成功！' : '注册成功！';
        setTimeout(() => {
          closeAuth();
          if (authMode === 'register') {
            authMode = 'login';
            updateAuthUI();
          }
          msg.textContent = '';
        }, 1000);
      } catch (e) {
        msg.textContent = '网络错误';
        console.error('认证错误:', e);
      }
    }
  </script>
</body>
