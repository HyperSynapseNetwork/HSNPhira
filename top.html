<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="description" content="HyperSynapse Network 提供免费、稳定、低延迟的 Phira 多人音乐游戏服务器" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="screen-orientation" content="landscape">
  <title>热门谱面 - HyperSynapse Phira</title>
  <link rel="stylesheet" type="text/css" href="./css/style.css">
  <link rel="stylesheet" type="text/css" href="./css/top.css">
</head>
<body>
  <div class="parallax-bg"></div>
  <div id="page-loader"></div>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $('#page-loader').load('./component/page-loader.html');
  </script>
  
  <div id="header"></div>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $('#header').load('./component/header.html');
  </script>
  
  <main id="main-content" style="opacity:0;transition:opacity 0.6s;">
    <div id="status" class="status">服务器状态：检测中...</div>
    
    <!-- 时间范围选择器 -->
    <div class="time-range-selector">
      <button class="chart-btn active" data-range="hour">小时榜</button>
      <button class="chart-btn" data-range="day">日榜</button>
      <button class="chart-btn" data-range="week">周榜</button>
      <button class="chart-btn" data-range="month">月榜</button>
    </div>
    
    <div id="table-container">
      <table id="charts-table">
        <thead>
          <tr>
            <th>名次</th>
            <th>谱面名称</th>
            <th>谱面ID</th>
            <th>游玩人数</th>
            <th>曲绘</th>
            <th>下载</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="6">加载中...</td></tr>
        </tbody>
      </table>
    </div>
    
    <!-- 分页控件 -->
    <div class="pagination">
      <button class="pagination-btn" id="prev-page" disabled>上一页</button>
      <span class="pagination-info" id="page-info">第 1 页</span>
      <button class="pagination-btn" id="next-page" disabled>下一页</button>
    </div>
    
    <!-- 缓存数据提示 -->
    <div id="cache-info" class="cache-info" style="display: none;"></div>
  </main>

  <!-- 复制成功提示 -->
  <div id="copy-notification" class="copy-notification">谱面ID已复制到剪贴板！</div>

  <div id="lightbox" onclick="hideLightbox()">
    <img id="lightbox-img" src="" alt="曲绘" />
  </div>
  
  <div id="auth"></div>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $('#auth').load('./component/auth.html');
  </script>

  <script src="js/top.js"></script>
</body>
</html>
